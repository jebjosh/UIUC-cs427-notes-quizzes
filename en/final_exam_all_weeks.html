<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&family=Source+Code+Pro:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf9f7;--surface:#ffffff;--surface2:#f4f3f0;
  --border:#e8e6e1;--text:#1c1b18;--text2:#4a4840;--muted:#8a8780;
  --accent:#3d6b4f;--accent-light:#edf4ef;
  --accent2:#7c5c2e;--accent2-light:#fdf4e7;
  --blue:#2d5fa6;--blue-light:#ebf1fb;
  --red:#a63d2d;--red-light:#fdf0ef;
  --tag-bg:#f0ede8;--radius:8px;
  --correct-bg:#dcfce7;--correct-text:#14532d;
  --wrong-bg:#fee2e2;--wrong-text:#7f1d1d;
  --reveal-bg:#dbeafe;--reveal-text:#1e3a8a;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);padding:0;min-height:100vh;}
.exam-shell{max-width:860px;margin:0 auto;padding:36px 24px 80px;}
.exam-header{margin-bottom:32px;}
.exam-header h1{font-family:'Lora',serif;font-size:1.75rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:8px;}
.exam-header p{font-size:0.9rem;color:var(--text2);line-height:1.6;}
.exam-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:28px;padding:16px 20px;background:var(--surface);border-radius:var(--radius);}
.exam-toolbar label{font-size:0.85rem;color:var(--text2);font-weight:500;}
.exam-toolbar select{font-family:'Source Sans 3',sans-serif;font-size:0.85rem;padding:6px 10px;border:none;border-radius:4px;background:var(--surface2);color:var(--text);cursor:pointer;}
.btn-primary{font-family:'Source Code Pro',monospace;font-size:0.8rem;font-weight:500;padding:8px 16px;border:none;background:var(--accent);color:#fff;border-radius:4px;cursor:pointer;}
.btn-primary:hover{opacity:0.88;}
.btn-secondary{font-family:'Source Code Pro',monospace;font-size:0.8rem;font-weight:500;padding:8px 16px;border:none;background:var(--surface2);color:var(--text2);border-radius:4px;cursor:pointer;}
.btn-secondary:hover{background:var(--tag-bg);color:var(--text);}
.score-bar{font-family:'Source Code Pro',monospace;font-size:0.82rem;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:8px;}
.score-pill{background:var(--surface2);border-radius:20px;padding:4px 12px;font-weight:500;color:var(--text);}
.week-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.wf-btn{font-family:'Source Code Pro',monospace;font-size:0.74rem;font-weight:500;padding:4px 10px;border:none;border-radius:4px;background:var(--surface2);color:var(--text2);cursor:pointer;}
.wf-btn.active{background:var(--accent-light);color:var(--accent);}
.wf-label{font-size:0.8rem;color:var(--muted);align-self:center;margin-right:4px;}
#questions-container{display:flex;flex-direction:column;gap:0;}
.q-card{background:var(--surface);border:none;border-radius:var(--radius);padding:24px 26px;margin-bottom:16px;}
.q-num{font-family:'Source Code Pro',monospace;font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;}
.q-week-tag{display:inline-block;font-family:'Source Code Pro',monospace;font-size:0.68rem;font-weight:500;padding:2px 7px;border-radius:3px;background:var(--tag-bg);color:var(--text2);margin-bottom:10px;}
.q-text{font-family:'Source Sans 3',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text);line-height:1.65;margin-bottom:14px;}
.q-code{margin:0 0 14px 0;padding:12px 14px;background:var(--surface2);border:none;border-radius:6px;overflow:auto;}
.q-code code{display:block;font-family:'Source Code Pro',monospace;font-size:0.8rem;line-height:1.55;background:none;padding:0;white-space:pre;}
.qz-options{display:flex;flex-direction:column;gap:6px;}
.qz-opt{font-family:'Source Sans 3',sans-serif;font-size:0.88rem;padding:9px 13px;border:none;border-radius:4px;background:var(--surface2);color:var(--text);cursor:pointer;text-align:left;line-height:1.45;}
.qz-opt:hover:not([disabled]){background:var(--accent-light);color:var(--accent);}
.qz-opt.qz-opt-selected{outline:2px solid var(--blue);background:var(--blue-light);color:var(--blue);}
.qz-submit{margin-top:10px;padding:10px 14px;border:none;border-radius:8px;background:var(--surface2);color:var(--text);font:inherit;font-weight:600;cursor:pointer;align-self:flex-start;}
.qz-submit:hover:not([disabled]){background:var(--tag-bg);}
.qz-submit:disabled{opacity:.65;cursor:default;}
.qz-opt[disabled]{cursor:default;}
.qz-opt-correct{background:var(--correct-bg)!important;color:var(--correct-text)!important;font-weight:600;border:none;border-radius:4px;padding:9px 13px;text-align:left;line-height:1.45;cursor:default;}
.qz-opt-wrong{background:var(--wrong-bg)!important;color:var(--wrong-text)!important;border:none;border-radius:4px;padding:9px 13px;text-align:left;line-height:1.45;cursor:default;}
.qz-opt-reveal{background:var(--reveal-bg)!important;color:var(--reveal-text)!important;border:none;border-radius:4px;padding:9px 13px;text-align:left;line-height:1.45;cursor:default;}
.qz-opt-neutral{background:var(--surface2);color:var(--muted);border:none;border-radius:4px;padding:9px 13px;text-align:left;line-height:1.45;cursor:default;}
.qz-explanation{display:none;margin-top:14px;background:var(--blue-light);border:none;border-radius:var(--radius);padding:12px 14px;font-size:0.86rem;color:var(--text2);line-height:1.6;}
.qz-expl-title{font-family:'Source Code Pro',monospace;font-weight:500;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--blue);margin-bottom:8px;}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:0.9rem;}

.multi-hint{margin:0 0 10px 0;font-size:0.8rem;color:var(--blue);font-weight:600;}
.timer-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.timer-controls input{width:84px;font-family:'Source Sans 3',sans-serif;font-size:0.85rem;padding:6px 10px;border:none;border-radius:4px;background:var(--surface2);color:var(--text);}
.floating-controls{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:10px;z-index:1000;}
.fab-btn{width:48px;height:48px;border:none;border-radius:999px;background:var(--accent);color:#fff;font-family:'Source Code Pro',monospace;font-size:0.82rem;font-weight:600;box-shadow:0 10px 24px rgba(0,0,0,0.14);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fab-btn:hover{opacity:.9;transform:translateY(-1px);}
.fab-btn:active{transform:translateY(0);}
.floating-hud{position:fixed;left:16px;bottom:16px;display:flex;flex-direction:column;gap:10px;z-index:999;}
.hud-pill{min-width:140px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);box-shadow:0 10px 24px rgba(0,0,0,0.10);font-family:'Source Code Pro',monospace;font-size:0.8rem;color:var(--text);}
.hud-pill strong{color:var(--accent);}
.q-card.is-next-target{outline:2px solid var(--blue);scroll-margin-top:96px;}
@media (max-width: 900px){
  .exam-shell{padding:22px 16px 100px;}
  .exam-toolbar{position:sticky;top:0;z-index:20;border:1px solid var(--border);padding:14px;background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);}
}
@media (max-width: 720px){
  .exam-shell{padding:18px 12px 120px;}
  .exam-header h1{font-size:1.35rem;}
  .exam-header p,.q-text,.qz-opt,.qz-explanation{font-size:0.95rem;}
  .q-card{padding:18px 16px;}
  .score-bar{width:100%;margin-left:0;justify-content:flex-start;}
  .timer-controls{width:100%;}
  .timer-controls input{width:72px;}
  .floating-controls{right:10px;bottom:12px;gap:8px;}
  .fab-btn{width:42px;height:42px;font-size:0.74rem;}
  .floating-hud{left:10px;bottom:12px;gap:8px;}
  .hud-pill{min-width:112px;padding:8px 10px;font-size:0.72rem;}
}


/* responsive-final-phone-patch */
@media (max-width:700px){
  .exam-shell{padding:18px 10px 96px;}
  .exam-header{margin-bottom:18px;}
  .exam-header h1{font-size:1.3rem;line-height:1.25;}
  .exam-header p{font-size:0.92rem;line-height:1.55;}
  .exam-toolbar{position:sticky;top:0;z-index:40;padding:12px 10px;gap:8px;margin-bottom:16px;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);}
  .exam-toolbar label{font-size:0.8rem;}
  .exam-toolbar select,.btn-primary,.btn-secondary{min-height:40px;}
  .btn-primary,.btn-secondary{padding:9px 12px;font-size:0.76rem;}
  .score-bar{width:100%;margin-left:0;justify-content:space-between;}
  .week-filter{flex-wrap:nowrap;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none;}
  .week-filter::-webkit-scrollbar{display:none;}
  .wf-btn{padding:8px 10px;font-size:0.72rem;white-space:nowrap;}
  .q-card{padding:18px 14px;margin-bottom:12px;scroll-margin-top:110px;}
  .q-text{font-size:0.95rem;line-height:1.55;}
  .qz-opt,.qz-opt-correct,.qz-opt-wrong,.qz-opt-reveal,.qz-opt-neutral{font-size:0.9rem;padding:11px 12px;}
  .q-code{padding:10px 12px;}
  .q-code code{font-size:0.74rem;line-height:1.45;}
  #floating-controls{right:10px;bottom:10px;gap:6px;}
  #floating-controls button{width:44px;height:44px;font-size:0.9rem;}
  #floating-hud{left:10px;right:10px;top:auto;bottom:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  #floating-hud .hud-box{min-width:0;padding:9px 10px;}
}
@media (max-width:420px){
  .exam-shell{padding:16px 8px 100px;}
  .exam-header h1{font-size:1.18rem;}
  .exam-toolbar{padding:10px 8px;}
  .q-card{padding:16px 12px;}
}

</style>

<body data-study-week="final">
<div class="app-shell">
<div id="study-sidebar-root"></div>
<div class="exam-shell">
  <div class="exam-header">
    <h1>CS427 — Full Practice Exam</h1>
    <p>All weeks combined. Questions are <strong>randomly shuffled</strong> on every reset. Use the week filter to focus on specific topics, or pick a question count and hit <strong>Start Exam</strong>.</p>
  </div>

  <div class="exam-toolbar">
    <label for="q-count">Questions:</label>
    <select id="q-count">
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="30" selected>30</option>
      <option value="50">50</option>
      <option value="all">All</option>
    </select>
    <div class="timer-controls">
      <label for="timer-minutes">Timer (min, 0 = unlimited):</label>
      <input id="timer-minutes" min="0" step="1" type="number" value="0"/>
    </div>
    <button class="btn-primary" id="btn-start" onclick="startExam()">🔀 Shuffle &amp; Start</button>
    <button class="btn-secondary" onclick="resetExam()">Reset</button>

    <button class="wf-btn active" data-week="all" onclick="toggleWeekFilter('all',this)">All Weeks</button>
    <button class="wf-btn" data-week="1" onclick="toggleWeekFilter('1',this)">Wk 1</button>
    <button class="wf-btn" data-week="2" onclick="toggleWeekFilter('2',this)">Wk 2</button>
    <button class="wf-btn" data-week="3" onclick="toggleWeekFilter('3',this)">Wk 3</button>
    <button class="wf-btn" data-week="4" onclick="toggleWeekFilter('4',this)">Wk 4</button>
    <button class="wf-btn" data-week="5" onclick="toggleWeekFilter('5',this)">Wk 5</button>
    <button class="wf-btn" data-week="6" onclick="toggleWeekFilter('6',this)">Wk 6</button>
    <button class="wf-btn" data-week="7" onclick="toggleWeekFilter('7',this)">Wk 7</button>
    <button class="wf-btn" data-week="8" onclick="toggleWeekFilter('8',this)">Wk 8</button>
    <button class="wf-btn" data-week="11" onclick="toggleWeekFilter('11',this)">Wk 11</button>
    <button class="wf-btn" data-week="14" onclick="toggleWeekFilter('14',this)">Wk 14</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="questions-container"></div>

  <div class="floating-controls" aria-label="Floating navigation controls">
    <button class="fab-btn" onclick="scrollToNextQuestion()" title="Next question">Next</button>
    <button class="fab-btn" onclick="pageUpExam()" title="Page up">Up</button>
    <button class="fab-btn" onclick="pageDownExam()" title="Page down">Dn</button>
    <button class="fab-btn" onclick="goTopExam()" title="Go to top">Top</button>

  <div class="floating-hud" aria-label="Exam status">
    <div class="hud-pill">Time: <strong id="floating-timer">∞</strong></div>
    <div class="hud-pill">Score: <strong id="floating-score">— / —</strong></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// MASTER QUESTION BANK — all weeks
// Each question: { w: weekNum, q: text, opts: [], ans: idx, exp: string, code?: string }
// ─────────────────────────────────────────────────────────────────────────────
var BANK = [

  // ══════════════ WEEK 1 — Introduction to Software Engineering ══════════════

  // ══════════════ WEEK 2 — Software Process ══════════════

  // ══════════════ WEEK 3 — Requirements Engineering ══════════════

  // ══════════════ WEEK 4 — Software Architecture ══════════════

  // ══════════════ WEEK 5 — OO Patterns Part 1 ══════════════

  // ══════════════ WEEK 6 — Design Patterns ══════════════

  // ══════════════ WEEK 7 — Software Testing ══════════════

  // ══════════════ WEEK 8 — JUnit Testing ══════════════

  // ══════════════ WEEK 11 — Debugging ══════════════

  // ══════════════ WEEK 14 — Software Maintenance ══════════════
  { w: 1, q: "Which of the following is NOT a part of Software Development Life Cycle?", opts: ["Requirements Phase", "Design Phase", "Implementation Phase", "Evaluation Phase"], ans: 3, exp: "Evaluation Phase is not one of the standard SDLC phases used here. The core phases are requirements, design, implementation, testing, and maintenance." },
  { w: 1, q: "The trinity of a software project does NOT include which of the following?", opts: ["Software System", "Software Design", "Software Users", "Software Development Process"], ans: 1, exp: "The project trinity here is software system, software users, and software development process. Software design is important, but it is not one of those three." },
  { w: 1, q: "______ provides flexibility for changing a component's internal design decisions without impacting the external code using this component's interface.", opts: ["Project Management", "Divide and Conquer", "Inheritance", "Information Hiding"], ans: 3, exp: "Information hiding keeps implementation details internal so the component can change without breaking code that uses its interface." },
  { w: 1, q: "Which of the following is a characteristic of Software?", opts: ["Malleable", "Simple", "Constant", "Requiring a single person to develop"], ans: 0, exp: "Software is malleable because it can be modified and adapted relatively easily compared with physical systems." },
  { w: 1, q: "Which of the following roles is/are project stakeholders of a software project? Select the best answer.", opts: ["Support Engineer", "Designer", "Tester", "All of the above"], ans: 3, exp: "Support engineers, designers, and testers are all stakeholders in a software project." },
  { w: 1, q: "Is the following statement TRUE?\nIn the context of a software project, users are different from customers.", opts: ["True", "False"], ans: 0, exp: "Users are the people who use the software, while customers are the people or organizations paying for it. They may be different." },
  { w: 1, q: "True or false?\nAdding more team members helps solve the software crisis.", opts: ["True", "False"], ans: 1, exp: "False. Adding people to a troubled or late project often makes it worse because of onboarding and communication overhead, which is Brooks' Law." },
  { w: 1, q: "John is an efficient programmer and eager to learn, but he has never worked on a team. Which attribute does he most need to become a successful software engineer?", opts: ["Working alone", "Being defensive about his work", "Ability to interact and collaborate effectively in a team", "None—John already has what he needs"], ans: 2, exp: "Software engineering is strongly collaborative, so teamwork and communication are essential." },
  { w: 1, q: "Which of the following statements is NOT true?", opts: [ "Software engineering is primarily concerned with multi-person development", "Software engineering is primarily concerned with writing a single version of a program", "Software engineering and programming are two different concepts" ], ans: 1, exp: "Software engineering is not just about producing a one-off program. It covers evolving systems, teamwork, process, quality, and maintenance." },
  { w: 1, q: "Which of the following is NOT among the competing goals of a software project (in the usual \"iron triangle\" sense)?", opts: [ "Time used by developers to develop the software", "Cost for the customers to pay the software project team to develop the software", "Quality of the developed software", "Market share occupied by the developed software" ], ans: 3, exp: "The classical competing goals are time, cost, and quality. Market share is a business outcome, not one of the standard project trade-off dimensions." },
  {w:1, q: "Which of the following is not a part of Software Development Cycle?", opts: ["Conception Phase", "Requirements Phase", "Design Phase", "Implementation Phase"], ans:0, exp: "The provided Week 1 source marks Conception Phase as the correct answer for this question."},
  {w:1, q: "Which of the following is not a part of the considerations when defining software engineering? Select the best answer.", opts: ["Systematic application of process for developing, operating, and maintaining software", "Practical, economic value provided by the software, being developed in a practical and economical way", "High quality of the software being developed", "High quality of the software engineers in the software project team"], ans:3, exp: "The definition focuses on process, economic practicality, and software quality rather than the quality of individual engineers as the defining element."},
  {w:1, q: "What does the Design phase of the Software Development cycle involve?", opts:["Specification of individual modules\' interfaces",'Specification of overall structure of modules','Checking conformance of design to requirements','All of the above'], ans:3, exp: "The design phase covers interfaces, overall structure, and checking that the design conforms to requirements."},
  {w:1, q: "What is Unit Testing?", opts: ["Testing of individual modules", "Testing of the entire system", "Testing after the integration of two modules", "Testing of user interface"], ans:0, exp: "Unit testing focuses on individual modules or units."},
  {w:1, q: "Is the following statement True or False? The 1968 NATO conference was started to address only the issue of defining the field of software engineering.", opts: ["True", "False"], ans:1, exp: "False — the conference also addressed the software crisis, not only the definition of the field."},
  {w:1, q: "Software Engineering involves which of the following? Select all that apply.", opts: ["Multi-person development", "Multiple-version programs", "None of the above"], ans:[0,1], exp: "Software engineering is concerned with team-based development and software that evolves across multiple versions."},
  {w:1, q: "Pick the INCORRECT statement from the following.", opts: ["Software engineering involves a Multi-Person development process", "Information hiding eases future extension of a program", "Programming involves multiple versions of a program", "Software engineering and programming are two different concepts"], ans:2, exp: "The incorrect statement is that programming involves multiple versions of a program; that broader concern belongs to software engineering."},
  {w:1, q: "Is the following statement True or False? A good programmer always makes a good software engineer.", opts: ["True", "False"], ans:1, exp: "False — software engineering also requires collaboration, process, communication, and design skills."},
  {w:1, q: "Which of the following properties define Software? Select all that apply.", opts: ["Malleable", "Complex", "Constant", "None of the above"], ans:[0,1], exp: "Software is malleable and complex; it is not constant."},
  {w:1, q: "Software systems vary in which of the following aspects? Select the best answer.", opts: ["Cost", "Size", "Requirements Stability", "All of the above"], ans:3, exp: "Software systems vary in cost, size, and requirements stability."},
  {w:1, q: "What does interactiveness in a software system indicate?", opts: ["Interaction of components within the software", "Interaction of humans with software", "All of the above", "None of the above"], ans:1, exp: "Here, interactiveness refers to interaction of humans with software."},
  {w:1, q: "Is the following statement True or False? Software is only used in the information technology industry.", opts: ["True", "False"], ans:1, exp: "False — software is used across many industries."},
  {w:1, q: "Which of the following belong/belongs to major stakeholders in a software project? Select the best answer.", opts: ["Users", "Customers", "Developers", "All of the above"], ans:3, exp: "Users, customers, and developers are all major stakeholders."},
  {w:1, q: "John is responsible to support Product A after the development of the product. Is John a stakeholder in the project?", opts: ["Yes", "No"], ans:0, exp: "Yes — someone responsible for product support is a stakeholder."},
  {w:1, q: "Which of the following are components of the trinity of a software project?", opts: ["Software System, Code, Users", "Software System, Software Users, Software Development Process", "Requirements, Development, Evaluation", "None of the above"], ans:1, exp: "The trinity is Software System, Software Users, and Software Development Process."},
  {w:1, q: "Is the following statement True or False? Users are different from customers.", opts: ["True", "False"], ans:0, exp: "True — the users and the paying customers can be different."},
  {w:1, q: "Anna is responsible for continuously testing Product A during the development process. Which of the following roles most closely fits Anna's responsibilities?", opts: ["Evaluator", "Tester", "Requirements engineer", "None of the above"], ans:1, exp: "A person continuously testing the product during development is acting as a tester."},
  {w:1, q: "Is the following statement True or False? Software is large but usually constant.", opts: ["True", "False"], ans:1, exp: "False — software evolves, so it is not usually constant."},
  {w:1, q: "Is the following statement True or False? Requirements for a software system in real world are usually ambiguous and evolving.", opts: ["True", "False"], ans:0, exp: "True — real-world requirements are often ambiguous and change over time."},
  {w:1, q: "Which of the following attributes make a good software engineer?", opts: ["Good programmer", "Good team player", "Open minded personality", "All of the above"], ans:3, exp: "A good software engineer benefits from all of these attributes."},
  { w: 1, q: "Which of the following is NOT among the competing goals of a software project (in the usual “iron triangle” sense)?", opts: [ "Time used by developers to develop the software", "Cost for the customers to pay the software project team to develop the software", "Quality of the developed software", "Market share occupied by the developed software" ], ans: 3, exp: "Market share occupied by the developed software — Market share is a business metric, NOT one of the classical competing goals (Time, Cost, Quality) of a software project." },
  { w: 1, q: "Is the following statement True or False?\\nThe 1968 NATO conference was started to address only the issue of defining the field of software engineering.", opts: ["True", "False"], ans: 1, exp: "False — The 1968 NATO conference was started not only to address the issue of defining software engineering, but also the issue of the software crisis." },
  { w: 1, q: "Is the following statement True or False?\\nA good programmer always makes a good software engineer.", opts: ["True", "False"], ans: 3, exp: "See Week 1 quiz for full explanation." },
  { w: 1, q: "Is the following statement True or False?\\nSoftware is only used in the information technology industry.", opts: ["True", "False"], ans: 0, exp: "True — This is incorrect." },
  { w: 1, q: "Is the following statement True or False?\\nUsers are different from customers.", opts: ["True", "False"], ans: 1, exp: "False — This is incorrect." },
  { w: 1, q: "Is the following statement True or False?\\nSoftware is large but usually constant.", opts: ["True", "False"], ans: 3, exp: "See Week 1 quiz for full explanation." },
  { w: 1, q: "Is the following statement True or False?\\nRequirements for a software system in the real world are usually ambiguous and evolving.", opts: ["True", "False"], ans: 0, exp: "True — Real-world requirements are often incomplete, ambiguous, and changing." },
  {w:2, q: "Which of the following is NOT one of the 5 sections of IEEE 1074?", opts: ["Project Management", "Pre-Development", "Testing Validation", "Support"], ans:2, exp: "The 5 sections are Project Management, Pre-Development, Development, Post-Development, and Support. Testing Validation is not a section."},
  {w:2, q: "In the Spiral model, which quadrant immediately follows \"Determine Objectives\"?", opts: ["Development and Test", "Plan the next iteration", "Identify and Resolve Risks", "Deployment"], ans:2, exp: "The four Spiral quadrants in order are: Determine Objectives → Identify and Resolve Risks → Development and Test → Plan Next Iteration."},
  {w:2, q: "In the Agile Manifesto, which is valued MORE than \"Processes and tools\"?", opts: ["Comprehensive documentation", "Contract negotiation", "Individuals and interactions", "Following a plan"], ans:2, exp: "The Manifesto values \"Individuals and interactions over Processes and tools.\""},
  {w:2, q: "In XP, what is Test-Driven Development (TDD)?", opts: ["Write tests after all code is complete", "Write the test first (it fails), then write code to pass it", "Skip tests for simple methods", "Hire a dedicated QA team to write tests"], ans:1, exp: "TDD: write the failing test first (red), then write code to make it pass (green)."},
  {w:2, q: "In Pair Programming, the Navigator role primarily:", opts: ["Types the code", "Observes and reviews for defects", "Runs the tests", "Manages the backlog"], ans:1, exp: "The Navigator reviews the Driver's work looking for tactical and strategic defects."},
  {w:2, q: "Project Velocity in XP is:", opts: ["The maximum speed at which a developer can type", "Story points completed in previous iterations, used to plan next iteration", "The number of bugs found per sprint", "Lines of code written per day"], ans:1, exp: "Velocity = story points actually completed in past iterations; used to set realistic iteration goals."},
  {w:2, q: "Risk Exposure is calculated as:", opts: ["Probability + Cost", "Probability × Cost", "Impact / Probability", "Cost / Impact"], ans:1, exp: "Risk Exposure = Probability × Cost (in dollars or effort). Higher exposure = higher priority."},
  {w:2, q: "Which of the Boehm & Turner five factors for methodology choice relates to how often requirements change?", opts: ["Personnel", "Criticality", "Dynamism", "Size"], ans:2, exp: "Dynamism measures the rate of requirements change — high change favors Agile."},
  {w:2, q: "The Waterfall model is good at detecting faults of:", opts: ["Commission", "Omission", "Regression", "Performance"], ans:1, exp: "Waterfall catches missing requirements (omission) through its formal requirements phase."},
  {w:2, q: "In PERT charts, the critical path is:", opts: ["The shortest path through the network", "The path with the most tasks", "The longest path — determines minimum project duration", "Any path with slack > 0"], ans:2, exp: "The critical path is the longest path; it determines the earliest possible completion date."},
  {w:2, q: "In RUP, which phase answers \"Should we build it?\"", opts: ["Inception", "Elaboration", "Construction", "Transition"], ans:0, exp: "Inception establishes feasibility and the go/no-go decision."},
  {w:2, q: "Story points measure:", opts: ["Hours of work", "The overall size of a user story (effort + complexity + uncertainty)", "Lines of code needed", "Number of tests required"], ans:1, exp: "Story points are abstract size units that combine effort, complexity, and uncertainty."},
  {w:2, q: "What is risk exposure?", opts: ["Expected value of loss", "Maximum loss possible", "Cost of the project", "Probability of the loss"], ans:0, exp: "Risk exposure is the expected value of loss, typically probability × impact."},
  {w:2, q: "True or False: Risk management reduces the loss of risk items after the loss happens.", opts: ["True", "False"], ans:1, exp: "Risk management is mainly proactive — it aims to reduce probability/impact before loss occurs."},
  {w:2, q: "Which of the following are strategies of risk planning? Select all that apply.", opts: ["Information Buying", "Contingency Plans", "Risk Reduction", "Risk Acceptance", "Risk Avoidance"], ans:[0,1,2,3], exp: "This quiz set marks Information Buying, Contingency Plans, Risk Reduction, and Risk Acceptance as correct."},
  {w:2, q: "Which of the following are actions to mitigate risks of changing requirements? Select all that apply.", opts: ["Iterative development", "On-site customer", "Detailed documentations", "Pair programming"], ans:[0,1], exp: "Iterative development and an on-site customer both help handle changing requirements."},
  {w:2, q: "Which of the following is not part of project management?", opts: ["Project initiation", "Project planning", "Project monitoring and control", "Requirements solicitation"], ans:3, exp: "Requirements solicitation belongs to requirements work, not project management."},
  {w:2, q: "Which of the following belongs to post-development activities? Select all that apply.", opts: ["Installation", "Maintenance", "Retirement", "Operation and support"], ans:[0,1,2,3], exp: "All four listed items are post-development activities in this course framing."},
  {w:2, q: "In which activity group is software requirements defined?", opts: ["Development", "Pre-development", "Project management", "Support"], ans:0, exp: "This quiz set places software requirements definition under Development."},
  {w:2, q: "Which of the following is an Agile process?", opts: ["eXtreme programming", "Waterfall", "RUP", "Bazaar"], ans:0, exp: "eXtreme Programming (XP) is the Agile process among these options."},
  {w:2, q: "True or False: In a waterfall process, one should move to the next phase only when its preceding phase is reviewed and verified.", opts: ["True", "False"], ans:0, exp: "Waterfall is sequential: the prior phase is reviewed and verified before moving on."},
  {w:2, q: "True or False: Unit testing is part of Integration phase in the modified waterfall process.", opts: ["True", "False"], ans:1, exp: "Unit testing is not part of the integration phase."},
  {w:2, q: "Which of the following process model is a risk-driven one?", opts: ["Waterfall", "Spiral", "RUP"], ans:1, exp: "Spiral is the classic risk-driven process model."},
  {w:2, q: "When is the initial version built in RUP?", opts: ["Inception", "Elaboration", "Construction", "Transition"], ans:1, exp: "This quiz set marks Elaboration as the phase where the initial version is built."},
  {w:2, q: "Which of the following is not an XP practice?", opts: ["Frequently rewriting code without changing behavior", "Pair programming", "Write formal specifications after implementations", "Plan each iteration at the beginning of the iteration"], ans:2, exp: "Writing formal specifications after implementation is not an XP practice."},
  {w:2, q: "True or False: The more experienced programmer should take the role of driver in pair programming.", opts: ["True", "False"], ans:1, exp: "Roles should be shared and switched; the more experienced person should not always be the driver."},
  {w:2, q: "Which of the following are true about pair programming? Select all that apply.", opts: ["Pair programming produces higher quality code", "Pair programming costs fewer man-hours to finish a project", "Pair should work on the same computer", "The roles of driver and observer should be periodically switched"], ans:[0,2,3], exp: "This quiz set marks higher quality code, same computer, and periodic role switching as correct."},
  {w:2, q: "Which of the following is a reason for NOT choosing the Scrum process?", opts: ["Product features have high inter-dependencies and are difficult to be split into potentially shippable increments", "Team members have very high skills", "Customers have changing requirements", "Requirement changes are unpredictable"], ans:0, exp: "If work cannot be split into shippable increments, Scrum is a worse fit."},
  {w:2, q: "Which of the following are factors to consider when choosing a software process? Select all that apply.", opts: ["Size", "Criticality", "Dynamism", "Personnel", "Culture"], ans:[0,1,2,3,4], exp: "All five are Boehm-Turner style factors used to choose a process."},
  {w:2, q: "Which process should a startup company that is developing a web app (which is a totally new kind in the market for gamification of music composition) choose?", opts: ["Agile methodology", "Plan-driven methodology"], ans:0, exp: "A startup building a novel web app is a strong fit for Agile."},
  {w:2, q: "Which of the following process is suitable for developing a control module for a nuclear power plant?", opts: ["eXtreme programming", "Waterfall", "Scrum"], ans:1, exp: "This highly critical context favors a plan-driven approach such as Waterfall."},
  {w:2, q: "True or False: Agile development is more tolerant toward a team with mostly novice programmers.", opts: ["True", "False"], ans:1, exp: "Agile is usually less tolerant of mostly novice teams because it expects strong self-management and communication."},
  {w:2, q: "Who are the most common writers for user stories?", opts: ["Users", "Developers", "Customers"], ans:2, exp: "This quiz set marks customers as the most common writers for user stories."},
  {w:2, q: "Who typically estimates the time for user stories?", opts: ["Users", "Developers", "Customers"], ans:1, exp: "Developers usually estimate the implementation effort for user stories."},
  {w:2, q: "What is a desirable unit used to estimate time/effort of a user story?", opts: ["Hour", "Man-hour", "Story point", "Linus"], ans:2, exp: "Story points are the desirable abstract unit for estimating user stories."},
  {w:2, q: "Which of the following are possible ways to estimate story points? Select all that apply.", opts: ["Expert opinion", "Analogy", "Planning Poker", "Planning Dice", "Disaggregation"], ans:[0,1,2,4], exp: "This quiz set marks Expert opinion, Analogy, Planning Poker, and Disaggregation as valid approaches."},
  {w:2, q: "Which of the following are major reasons to choose a PERT chart over a Gantt chart?", opts: ["Need to find a critical path", "Managing tasks while project is happening", "Need to show dependencies", "Project has few dependencies"], ans:0, exp: "PERT is especially useful when you need to identify the critical path."},
  {w:2, q: "When is a programming task completed in XP?", opts: ["When refactoring completes", "When the task is marked as done on the task board", "When an initial version is written", "When all tests pass"], ans:3, exp: "In XP, a programming task is completed when all tests pass."},
  {w:2, q: "How to calculate slack time? (ES = earliest time when the activity can be started. LS = latest time when the activity must be started. CR = Critical path length. LF = earliest finish time)", opts: ["LF - ES", "LS - ES", "LS + ES", "CR - (LS - ES)"], ans:1, exp: "Slack time = LS - ES."},
  {w:2, q: "What tasks should you give highest priority to optimize?", opts: ["Tasks with longest slack", "Tasks with shortest slack", "Tasks on the critical path", "Longest tasks"], ans:2, exp: "Tasks on the critical path have the highest priority to optimize."},
  {w:2, q: "Which of the following is a situation under which using a waterfall model may be undesirable?", opts: ["Frequently changing requirements", "Mission critical use case", "Customer with clear objective", "Large development team"], ans:0, exp: "Frequent requirement changes make Waterfall undesirable."},
  {w:2, q: "The Elaboration stage in the Rational Unified Process includes which of the following activities:", opts: ["Implement further improvement from initial version", "Implement initial version", "Determining features", "Testing/using the software"], ans:1, exp: "This quiz set marks implementing the initial version as the Elaboration-stage activity."},
  {w:2, q: "A team of 6 developers have been assigned to develop a web application to monitor statuses of the used 3rd party services (whose requirements can be updated frequently and which are not mission/financial/safety-critical ones). Which of the following software development models best suits the purpose?", opts: ["Waterfall Model", "Spiral Model", "Scrum Model", "Chaos Model"], ans:2, exp: "Scrum fits a small team with frequently changing requirements in a low-risk context."},
  {w:2, q: "Extreme Programming (XP) has which of the following advantages?", opts: ["Comprehensive documentation is prepared throughout the process.", "The customers are closely engaged throughout the process, not just only the beginning.", "All features are released at once", "The resulting software has high fault tolerance."], ans:1, exp: "A key XP advantage is that customers stay closely engaged throughout the process."},
  {w:2, q: "Scrum Process does not include which of the following activities?", opts: ["Daily Scrum Meeting", "Quarterly Team Reflection", "Prioritizing Product Backlog Tasks", "Delivering Product Increment After a Sprint"], ans:1, exp: "Quarterly Team Reflection is not a standard Scrum activity in this quiz set."},
  { w: 2, q: "A team of six developers builds a web app with frequently changing requirements in a low-stakes context. Which model fits best?", opts: ["Waterfall Model", "Spiral Model", "Scrum Model", "Chaos Model"], ans: 2, exp: "Scrum Model — Good for changing requirements and small teams." },
  { w: 2, q: "Which of the following is not part of Scrum?", opts: ["Daily Scrum Meeting", "Quarterly Team Reflection", "Prioritizing Product-Backlog Tasks", "Delivering Product Increment After a Sprint"], ans: 1, exp: "Quarterly reflection is not Scrum standard; retrospectives happen each Sprint." },
  { w: 2, q: "Which of the following projects prefers plan-driven methodology over agile methodology?", opts: ["Chatting-room website", "Video-game simulator", "Phone calculator", "Software for rockets"], ans: 3, exp: "Rocket software is mission-critical and strongly favors plan-driven processes." },
  { w: 2, q: "Which situation belongs to risks in software development?", opts: ["Late delivery", "Wrong feature requirement", "Team dissolution", "All of the above"], ans: 3, exp: "All listed options are recognized software risks." },
  { w: 2, q: "For the Gantt chart (Task1 Day1-2, Task2 Day1.5-3, Task3 Day3-5, Task4 Day2-4), which statement is wrong?", opts: [ "The relationship between tasks 1 and 2 satisfies the Start-To-Start constraint", "The relationship between tasks 2 and 3 satisfies the Finish-To-Start constraint", "The relationship between tasks 3 and 4 satisfies the Finish-To-Finish constraint", "The relationship between tasks 1 and 4 satisfies the Finish-To-Start constraint" ], ans: 3, exp: "This is the wrong statement in the question set." },
  { w: 2, q: "For the PERT chart (A→B:6, B→C:3, B→D:10, C→E:7, D→E:5), what is the critical path?", opts: ["B→C→E", "B→D→E", "A→B→C→E", "A→B→D→E"], ans: 3, exp: "Complete longest path with total 21." },
  { w: 2, q: "In a PERT chart, which statement is correct?", opts: [ "An arrow edge between two events indicates data flow", "The label on the arrow edge represents event importance", "The graph for the PERT chart is a directed acyclic graph", "Events on the critical paths have slack time" ], ans: 2, exp: "PERT is modeled as a directed acyclic graph." },
  { w: 2, q: "Jane values data at $50,000 on a hard drive with 2% failure probability. What is risk exposure?", opts: ["$50,000", "$1,000", "$49,000", "$2"], ans: 1, exp: "2% × 50,000 = 1,000." },
  { w: 2, q: "Jane purchases an off-site backup plan. Which risk mitigation strategy is this?", opts: ["Risk avoidance", "Risk protection", "Risk acceptance", "Risk monitoring"], ans: 1, exp: "She proactively reduces impact of possible loss." },
  { w: 2, q: "A team chooses Agile. Which is not a justifying reason?", opts: [ "Customers constantly anticipate new features", "Start-up with small team", "Engineers prefer an ordered culture", "Majority of engineers have high skill levels" ], ans: 2, exp: "Ordered-culture preference points more to plan-driven methods." },
  { w: 2, q: "For two components, which practice usually costs fewer man-hours?", opts: ["Two developers working in parallel", "Two developers pair-programming sequentially"], ans: 0, exp: "Parallel development generally uses fewer man-hours for this case." },
  { w: 2, q: "Which process should a startup company developing a new web app for music-composition gamification choose?", opts: ["Agile methodology", "Plan-driven methodology"], ans: 2, exp: "See Week 2 quiz for full explanation." },
  { w: 2, q: "How do you calculate slack time? (ES = earliest start, LS = latest start, LF = latest finish, CR = critical path length)", opts: ["LF - ES", "LS - ES", "LS + ES", "CR - (LS - ES)"], ans: 0, exp: "LF - ES is not the slack formula used here." },
  { w: 2, q: "A team of 6 developers has been assigned to develop a web application to monitor statuses of the used 3rd party services with frequently changing requirements and low risk. Which software development models best suits the purpose?", opts: ["Waterfall Model", "Spiral Model", "Scrum Model", "Chaos Model"], ans: 0, exp: "Waterfall is a poor fit for frequent changes." },
  {w:3, q: "According to IEEE 2014, \"shall\" in a requirement means:", opts: ["Is recommended that", "Is a future reference not under system control", "Is required to (mandatory)", "Depends on context"], ans:2, exp: "\"Shall\" = mandatory requirement. \"Should\" = recommended. \"Will\" = future reference outside system control."},
  {w:3, q: "A descriptive statement in requirements is one that:", opts: ["Holds only when the system enforces it", "Holds regardless of how the system behaves (e.g., physical law)", "Is desirable but optional", "Describes the user interface"], ans:1, exp: "Descriptive statements hold due to domain reality/physics, not software enforcement."},
  {w:3, q: "The \"<<include>>\" stereotype in a use case diagram means:", opts: ["X optionally includes Y", "X always includes Y as a subtask", "Y extends X in exceptional cases", "X and Y are alternative paths"], ans:1, exp: "<<include>>: in the course of doing X, Y will ALWAYS be completed — Y is a required subtask."},
  {w:3, q: "Which is the MOST complete and formal kind of use case?", opts: ["Actor-goal list", "Use case brief", "Casual use case", "Fully dressed use case"], ans:3, exp: "Fully dressed has labeled sections: Primary Actor, Preconditions, Main Flow, Subflows, Alternative Flows."},
  {w:3, q: "Requirements elicitation is defined as (Nuseibeh & Easterbrook, 2000):", opts: ["Writing formal specifications", "A process of discovering and adjusting stakeholder expectations", "Running automated tests", "Implementing user stories"], ans:1, exp: "Elicitation: discover stakeholder expectations AND adjust them (resolve conflicts, help articulate needs)."},
  {w:3, q: "Which quality factor of requirements is violated by \"The system should be fast\"?", opts: ["Completeness", "Unambiguity", "Measurability", "Feasibility"], ans:2, exp: "\"Fast\" has no metric — it is unmeasurable. A measurable version would specify response time."},
  {w:3, q: "In the health claims system, which informal requirement involves OCR processing?", opts: ["R1", "R2", "R5", "R7"], ans:1, exp: "R2: Scanned paper and fax are processed by OCR after form dropout, deskewing, despeckling."},
  {w:3, q: "The \"Neutralize\" step in tracking/reproducing removes:", opts: ["System configuration data", "Negative and emotional language from the description", "Steps that cannot be reproduced", "Duplicate entries"], ans:1, exp: "Neutralize removes emotional wording (\"nasty bug wasted my time\") leaving only technical facts."},
  {w:3, q:"Which of the following options are/is an example of target quality factors of requirements? Select all that apply.", opts:["Completeness","Consistency","Feasibility","Measurability","Opacity"], ans:[0,1,2,3], exp:"Completeness — Completeness is a core target quality factor: the requirement set should cover all necessary behavior and constraints."},
  {w:3, q:"\"All doors should be opened as soon as the train is stopped at the terminal\". The requirement above, also mentioned in the lecture video, shows which of the following common flaws in requirement?", opts:["Ambiguity","Unmeasurability","Contradiction","Poor structuring"], ans:0, exp:"Ambiguity — \"as soon as\" is vague and can be interpreted differently, so the requirement is ambiguous."},
  {w:3, q:"\"The login page shall be user-friendly.\" The requirement above, also mentioned in the lecture video, shows which of the following common flaws in a requirement?", opts:["Unmeasurability","Contradiction","Inadequacy","Poor structuring"], ans:0, exp:"Unmeasurability — \"user-friendly\" is subjective and not directly testable without a measurable criterion."},
  {w:3, q:"Is the following statement true or false? Requirements describe software engineers' need in order to build the desired system, e.g. what software engineering tools they need for development.", opts:["False","True"], ans:0, exp:"False — Requirements are about expressing stakeholders' needs to achieve goals in the problem domain, not about what tools software engineers need."},
  {w:3, q:"In the following options, which are/is among the reasons to write requirements according to the lecture video? Select all that apply.", opts:["Testers could test the software developed against the requirements.","Managers could use requirements to allocate resources and manage the development","Developers could implement the system according to requirements"], ans:[0,1,2], exp:"Testers could test the software developed against the requirements. — Requirements are used as a basis for validation and acceptance testing."},
  {w:3, q:"When writing mandatory requirements for a rocket project, you wrote \"The main engine control unit ______ stop once the aircraft returns to the earth atmosphere.\"", opts:["shall","will","should"], ans:0, exp:"shall — \"Shall\" is the standard wording for a mandatory requirement."},
  {w:3, q:"Which are/is a purpose of requirements specification? Select all that apply.", opts:["Serve as communication media among the stakeholders","Evaluate whether the developed system satisfies the requirements","Serve as contracts that can be legally binding between the customers and the project teams"], ans:[0,1,2], exp:"Serve as communication media among the stakeholders — Specifications provide a common reference point for stakeholders."},
  {w:3, q:"Which of the following can be used as notations for requirement specifications? Select all that apply.", opts:["Data flow diagram","UML","Finite state machine","User stories","Pseudocode"], ans:[0,1,2,3,4], exp:"Data flow diagram — A valid notation for modeling flows of data in the problem domain or system."},
  {w:3, q:"Which of the following statements of requirements engineering is NOT correct?", opts:["Requirements engineering is about discovering stakeholders' needs along with adjusting their expectations.","Requirements engineering is concerned with real-world goals for functions of a software system and constraints on the software system.","Requirements engineering helps engineers understand and adjust requirements.","Requirements engineering is only about one single version of a software system at a specific time."], ans:3, exp:"Requirements engineering is about discovering stakeholders' needs along with adjusting their expectations. — This is correct and central to elicitation."},
  {w:3, q:"Which of the following statements is correct?", opts:["A \"system-as-is\" is a set of interacting components in the problem world to satisfy some global objectives.","A \"system-as-is\" describes the system as it should be when the machine will be built and operated in it.","A \"system-as-is\" describes the system as it exists before the machine is built into it."], ans:2, exp:"A \"system-as-is\" is a set of interacting components in the problem world to satisfy some global objectives. — That describes the broader problem world/system concept, not specifically the as-is view."},
  {w:3, q:"Which of the following options could we investigate in \"system-as-is\"? Select all that apply.", opts:["What problems are in the \"system-as-is\"?","What opportunities are in the \"system-as-is\"?","What domain knowledge is in the \"system-as-is\"?"], ans:[0,1,2], exp:"What problems are in the \"system-as-is\"? — Current pain points are a major reason to analyze the as-is system."},
  {w:3, q:"Which of the following are/is an example of elicitation techniques? Select all that apply.", opts:["Questionnaires, surveys, and interviews.","Brainstorming and focus group.","Early feedback gathering from stakeholders.","Protocol analysis and card sorting."], ans:[0,1,2,3], exp:"Questionnaires, surveys, and interviews. — Standard elicitation techniques."},
  {w:3, q:"Which of the following statements are/is an example of key information to be elicited? Select all that apply.", opts:["Who are the individuals or organizations that stand to gain or lose from the success or failure of a system?","What might prevent us from solving the problem?","What problem needs to be solved?"], ans:[0,1,2], exp:"Who are the individuals or organizations that stand to gain or lose from the success or failure of a system? — This identifies stakeholders."},
  {w:3, q:"Which of the following statements is true about requirements elicitation?", opts:["It is about discovering stakeholder expectations and adjusting the expectations","It is about guiding the developers to produce correct products according to the requirements","It is about making sure that the stakeholders understand how the project's functionalities are implemented.","It is about making sure that the tasks given by the product manager are correct"], ans:0, exp:"It is about discovering stakeholder expectations and adjusting the expectations — This best matches the purpose of requirements elicitation."},
  {w:3, q:"Which of the following is NOT a main component for use case requirements?", opts:["Use case diagrams.","Use case.","Stakeholders.","Actors."], ans:2, exp:"Use case diagrams. — A main component of use case requirements."},
  {w:3, q:"Which of the following statements is not true about Actors?", opts:["Actors are part of the system and interact with the system.","Actors can both provide inputs and receive outputs from the system.","Actors can receive outputs from the system.","Actors can provide inputs to the system."], ans:0, exp:"Actors are part of the system and interact with the system. — This is not true; actors are outside the system boundary."},
  {w:3, q:"Which of the following statements is not true about Use Case?", opts:["A use case describes a sequence of events that happen when the system responds to an action.","The description of a use case needs to be a major piece of functionalities being complete from the beginning to end.","The description of a use case needs to be easy to read, short but still tell a story.","A use case can deliver no value for any of the actors."], ans:3, exp:"A use case describes a sequence of events that happen when the system responds to an action. — True."},
  {w:3, q:"Which of the following Use Cases are/is used for helping decide design scope? Select all that apply.", opts:["Casual use cases","Fully dressed use cases","Actor-goal list","Use case brief"], ans:[2,3], exp:"Casual use cases — Useful for narrative detail, but not the primary scoping choice here."},
  {w:3, q:"Which statement about the Actor-goal list is NOT correct?", opts:["A goal can be on different levels at the same time.","A primary actor shall always have a goal.","We must pick the right level for goals.","We can sort goals based on the priority to the designer of the system."], ans:0, exp:"A goal can be on different levels at the same time. — Not correct in this framing; goals should be stated at an intentional and appropriate level for analysis."},
  {w:3, q:"Which of the following statements is correct for Casual and Fully Dressed use cases? Select all that apply.", opts:["Casual use cases consist of normal paragraphs but fully dressed use cases have labeled sections.","Casual and fully dressed use cases emphasize \"main success scenarios\".","Casual and fully dressed use cases are used to tell developers what to build.","Casual and fully dressed use cases should also include how to deal with failures."], ans:[0,1,2,3], exp:"Casual use cases consist of normal paragraphs but fully dressed use cases have labeled sections. — Correct structural distinction."},
  { w: 3, q: "In the following options, which is NOT among the reasons to write requirements according to the lecture video?", opts: [ "Managers could use requirements to allocate resources and manage the development", "Developers could implement the system according to requirements", "Testers could test the software developed against the requirements", "Support engineers could use the requirements to decide whether using a system shall be discontinued or not" ], ans: 3, exp: "Support engineers could use the requirements to decide whether using a system shall be discontinued or not — This is NOT a reason to write requirements. Discontinuation decisions are a business/operational concern, not driven by requirements specifications." },
  { w: 3, q: "Which of the following statements is a functional requirement?", opts: [ "The server code shall be written in C.", "A text message shall be sent to the customer's phone when the customer signs up.", "A new user shall be able to finish ordering an equipment by navigating through the system UI within 10 minutes.", "The search service shall answer a query in 2 seconds." ], ans: 1, exp: "A text message shall be sent to the customer's phone when the customer signs up. — This IS a functional requirement: it describes a specific system action (send SMS) triggered by a specific event (sign-up)." },
  { w: 3, q: "Which of the following statements is a non-functional requirement?", opts: ["s full contents shall be displayed within 3 seconds.\", \"The system shall record users"], ans: 1, exp: "The table's full contents shall be displayed within 3 seconds. — The 'within 3 seconds' constraint is a performance requirement, making this non-functional." },
  { w: 3, q: "Which of the following is typically NOT used as notations for requirement specifications?", opts: [ "UML", "User story", "Test plan", "Data flow diagram" ], ans: 2, exp: "Test plan — A test plan is a testing-phase artifact used to plan and document testing activities. It is NOT a requirements specification notation." },
  { w: 3, q: "When writing a mandatory requirement, you wrote \\\"The driver's door ______ be closed once the car is moving.\\\"", opts: [ "shall", "will", "should" ], ans: 0, exp: "shall — 'Shall' expresses a mandatory requirement. For safety-critical requirements like this, 'shall' is the correct and standard term." },
  { w: 3, q: "Which of the following is a descriptive statement?", opts: [ "The same person cannot be located in two different buildings at the same time.", "A user shall not use the same registration code more than once.", "Train doors shall always remain closed when the train is moving.", "A person shall not borrow more than three books at the same time." ], ans: 0, exp: "The same person cannot be located in two different buildings at the same time. — This is a descriptive statement: it states a real-world physical fact (domain knowledge) that is always true, independent of any software system." },
  { w: 3, q: "Refer to the schedule below. What is the maximum number of tasks that are in progress on the same day at any time?", opts: ["1", "2", "3", "4"], ans: 2, exp: "3 — Day 2 has Task 1 (days 1–2), Task 2 (days 2–3), and Task 4 (days 2–5) in progress simultaneously. No day has four tasks at once." },
  { w: 3, q: "Refer to the directed graph below. Each edge weight is an execution time. What is the total latency of the critical path from A to E?", opts: ["16", "18", "21", "24"], ans: 2, exp: "21 — The critical path is A → B → D → E: 6 + 10 + 5 = 21 (longer than A → B → C → E = 16)." },
  { w: 3, q: "Which of the following statement is NOT true about Actors?", opts: [ "Actors can both provide inputs and receive outputs from the system.", "Actors can receive outputs from the system.", "Actors are inside of the system and thus part of the system.", "Actors can provide inputs to the system." ], ans: 2, exp: "Actors are inside of the system and thus part of the system. — This is NOT true. Actors are always external to the system. They reside outside the system boundary and interact with it from the outside." },
  { w: 3, q: "Which of following Use Cases is used for helping decide design scope?", opts: [ "Actor-goal list", "All of actor-goal list, use case brief, casual use cases, and fully dressed use cases", "Casual use cases", "Fully dressed use cases" ], ans: 0, exp: "Actor-goal list — The actor-goal list is the most high-level format, used specifically to enumerate what each actor wants to achieve. This helps teams determine the scope of the design." },
  { w: 3, q: "Which of the following statements is NOT correct for casual and fully dressed use cases?", opts: [ "Casual and fully dressed use cases are used to tell developers how to implement some requirements.", "Casual and fully dressed use cases emphasize \"main success scenarios\".", "Casual and fully dressed use cases should also include requirements on dealing with failures.", "Casual use cases consist of normal paragraphs but fully dressed use cases have labeled sections." ], ans: 0, exp: "Casual and fully dressed use cases are used to tell developers how to implement some requirements. — This is NOT correct. Use cases describe what the system should do (behavior), not how to implement it. Implementation decisions belong to the Design Phase." },
  { w: 3, q: "\\\"The book-order process shall be user-friendly.\\\"\\nThe requirement above shows which of the following common flaws in a requirement?", opts: [ "Unmeasurability", "Contradiction", "Poor structuring", "Inadequacy" ], ans: 0, exp: "Unmeasurability — 'User-friendly' cannot be objectively measured or tested. A good requirement must be verifiable; this should be rewritten with measurable criteria (e.g., 'shall be completed within 3 clicks')." },
  { w: 3, q: "A \\“___________\\\" is a set of interacting components in the problem world to satisfy some global objectives.", opts: [ "system.", "system-as-is.", "system-to-be" ], ans: 0, exp: "A System is a set of interacting components in the problem world to satisfy some global objectives" },
  {w:4, q: "Tony Hoare's quote says good software design should be:", opts: ["Complicated enough to hide deficiencies", "Simple enough that deficiencies are obvious", "Both simple and complicated", "Abstracted at every level"], ans:1, exp: "\"Make it so simple that there are obviously no deficiencies\" — simplicity, not complexity."},
  {w:4, q: "Prescriptive architecture is also called:", opts: ["As-implemented architecture", "As-designed architecture", "As-tested architecture", "As-deployed architecture"], ans:1, exp: "Prescriptive = as-designed; Descriptive = as-implemented. Drift between them is architectural drift."},
  {w:4, q: "The Perry & Wolf \"Rationale\" component answers:", opts: ["WHAT elements exist", "HOW elements are constrained", "WHY design decisions were made", "WHERE components are deployed"], ans:2, exp: "Rationale = WHY — the justification for design decisions, derived from system requirements."},
  {w:4, q: "Information hiding (Parnas, 1972) means each module should:", opts: ["Expose all its internal state", "Hide a design decision from other modules", "Share all data through global variables", "Have no interface"], ans:1, exp: "Each module hides a design decision; others know only the interface, not the implementation."},
  {w:4, q: "Conway's Law states:", opts:['The architecture of a system matches its team\'s communication structure','Good architecture requires deep inheritance hierarchies','Simple systems have simple architectures','Performance determines architecture'], ans:0, exp: "Conway's Law: the system's architecture mirrors the communication structure of the team that built it."},
  {w:4, q: "In the Pipe-and-Filter architectural style, what are the connectors?", opts: ["Filters", "Pipes", "Events", "Procedure calls"], ans:1, exp: "Pipes are the connectors; filters are the components that transform data."},
  {w:4, q: "The Gold Plating anti-pattern for software architects means:", opts: ["The architect never attends team meetings", "The architect over-designs, adding unnecessary complexity", "The architect is absent after handing over the design", "The architect only gives advice but produces nothing"], ans:1, exp: "Gold Plating: spending too much time on unnecessary complexity or future-proofing that isn't needed."},
  {w:4, q: "Which type of coupling (cohesion ranking weakest to strongest) comes right after \"Temporal\"?", opts: ["Logical", "Procedural", "Communicational", "Sequential"], ans:1, exp: "Weakest to strongest: Coincidental < Logical < Temporal < Procedural < Communicational < Sequential < Functional."},
  {w:4, q: "In MVC, which component notifies views of state changes?", opts: ["View", "Controller", "Model", "All three equally"], ans:2, exp: "The Model stores state and notifies all registered Views when state changes via event/observer notification."},
  {w:4, q:"What is the role of software design?", opts:["Exposing certain properties of the software system before implementation", "Helping developers reason about the capability of the software system to satisfy certain requirements", "Acting as a design for software system construction", "All of them"], ans:3, exp:"Software design exposes key properties before implementation, helps developers reason about requirement satisfaction, and acts as a blueprint for construction."},
  {w:4, q:"Which of the following is NOT an aspect of software architecture?", opts:["The structure of the system", "The interactions among components within the system", "A component's internal details that are unrelated to its interactions with other components", "Design decisions about the system"], ans:2, exp:"Architecture focuses on structure, interactions, and major design decisions, not internal implementation details that do not affect interactions."},
  {w:4, q:"Which of the following is wrong?", opts:["A prescriptive architecture refers to the architecture defined before the system is constructed", "A descriptive architecture refers to the architecture as it exists after the system is built", "When there is a conflict between the prescriptive architecture and the descriptive architecture, we should always modify the descriptive architecture only", "Either the prescriptive architecture or the descriptive architecture can evolve over time"], ans:2, exp:"Prescriptive and descriptive architectures can both evolve; conflict does not mean you always change only the descriptive architecture."},
  {w:4, q:"Which of the following is NOT a benefit of software architecture?", opts:["Allowing developers to have a better understanding of the essential part of the system", "Making your software scalable", "Better code maintainability", "All of the above are benefits"], ans:3, exp:"All listed items are recognized benefits of software architecture."},
  {w:4, q:"What is NOT true about a qualified software architect?", opts:["Have expertise in design and pick the best option among design options", "Be a master in system development", "Be able to complete all work independently"], ans:2, exp:"Software architects do not work in isolation; architecture is collaborative."},
  {w:4, q:"What is the best way for a good software architect to allocate percentage of time on internal focus, inwards activities, and outwards activities?", opts:["20%, 40%, 40%", "70%, 10%, 20%", "50%, 25%, 25%", "50%, 40%, 10%"], ans:2, exp:"The expected distribution in this material is 50%, 25%, 25%."},
  {w:4, q:"True or False: There will always be a serious problem if a software architect allocates very little time to work directly on the software architecture.", opts:["True", "False"], ans:1, exp:"Not every case becomes a serious problem automatically, so the statement is false."},
  {w:4, q:"Which of the following is NOT an example of abstraction?", opts:["Ignoring specific details", "Generalizing common properties", "Focusing on individual instances"], ans:2, exp:"Abstraction suppresses details and generalizes patterns; focusing on individual instances is the opposite."},
  {w:4, q:"True or False: There are NO undesirable side effects on runtime performance when introducing abstraction in software design.", opts:["True", "False"], ans:1, exp:"Abstraction can introduce overhead, so the statement is false."},
  {w:4, q:"True or False: A file descriptor serves as an abstraction when it is used to inform the kernel which file to access, instead of using the file's actual name.", opts:["True", "False"], ans:0, exp:"A file descriptor lets a process access a file without needing the file's real name, so it is an abstraction."},
  {w:4, q:"Making a Python class object is ________.", opts:["Control abstraction", "Data abstraction", "Procedural abstraction"], ans:1, exp:"Defining a class creates a data abstraction: it packages data and behavior behind an interface."},
  {w:4, q:"Measuring the degree to which one module depends on others refers to the degree of ______.", opts:["Cohesion", "Coupling"], ans:1, exp:"Dependence between modules is coupling; cohesion is within a module."},
  {w:4, q:"If functions in a module can receive different kinds of inputs but produce the same output, then this module exhibits ______.", opts:["Coincidental cohesion", "Communicational cohesion", "Logical cohesion", "Temporal cohesion"], ans:1, exp:"The expected answer in this question set is communicational cohesion."},
  {w:4, q:"According to Conway's Law, when assigning team members to a group working on the same module, it's better to:", opts:["Assign team members from the same geo location", "Assign team members randomly"], ans:0, exp:"Because communication structure shapes system structure, colocated teams fit Conway's Law better."},
  {w:4, q:"True or False: Refactoring is a good way to achieve high modularity.", opts:["True", "False"], ans:0, exp:"Refactoring can improve module boundaries and reduce dependency without changing behavior."},
  {w:4, q:"Which of the following is NOT a component of a compiler's software architecture?", opts:["Front end component", "Modular component", "Middle-end component", "Back end component"], ans:1, exp:"Front end, middle-end, and back end are standard components; 'modular component' is not a standard compiler stage here."},
  {w:4, q:"The backend component does NOT pass machine code to which of the following?", opts:["ARM", "Sparc", "PowerPC", "Ada"], ans:3, exp:"Ada is a programming language, not a machine-code target architecture."},
  {w:4, q:"If a part in a software system can provide a specific functional feature, then it is a ____.", opts:["component", "connector"], ans:0, exp:"Components provide functionality; connectors coordinate interactions."},
  {w:4, q:"A procedure call is a ________.", opts:["component", "connector"], ans:1, exp:"Procedure calls are connectors because they are interaction mechanisms between software parts."},
  {w:4, q:"In the client-server style, which of the following is NOT true about the server?", opts:["Dealing with requests from clients", "Knowing the identity of each client", "Using the same protocol with the client for communication"], ans:1, exp:"A server handles requests and protocols but does not need to know each client's identity."},
  {w:4, q:"SVN primarily uses the ________ architectural style.", opts:["layered/tiered style", "client-server style", "pipe and filter style"], ans:1, exp:"SVN is commonly modeled as a client-server system."},
  {w:4, q:"If a software architecture separates its functionalities into multiple tiers, then it follows the ________.", opts:["layered/tiered style", "client-server style", "pipe and filter style"], ans:0, exp:"Multiple tiers indicate the layered or tiered architectural style."},
  {w:4, q:"In the model-view-controller (MVC) architecture, the model component defines the ______.", opts:["Data access layer", "Presentation layer", "Business logic layer", "Interface layer"], ans:0, exp:"This quiz maps the model to the data access layer."},
  {w:4, q:"The component in MVC for sending out state queries is named ________.", opts:["model", "view", "controller"], ans:1, exp:"In this quiz's terminology, the view sends out state queries."},
  {w:4, q:"When a client hits the button on GUI to request information from a database, what mode is that?", opts:["Pull", "Push"], ans:0, exp:"That is pull mode because the client explicitly requests the data."},
  {w:4, q:"Adding a new controller class can benefit from MVC in what way?", opts:["Ability to provide multiple views", "Support for asynchronous technique", "Modification not affecting the entire model"], ans:2, exp:"MVC isolates change so modifications do not require changing the entire model."},
  {w:4, q:"True or False: Compared to an architecture style, an architecture pattern is typically more general.", opts:["True", "False"], ans:1, exp:"In this material, the statement is false."},
  { w: 4, q: "True or False: Under the abstraction of using a Unix file descriptor, a process needs to know a file's actual name in order to get access to it.", opts: ["True", "False"], ans: 1, exp: "False — Correct. A Unix file descriptor is an abstraction: the process can read/write using only that descriptor, without knowing the file's actual name or location." },
  { w: 4, q: "If functions in a module have similar functionalities, then this module has ________", opts: ["Coincidental cohesion", "Communicational cohesion", "Logical cohesion", "Temporal cohesion"], ans: 2, exp: "Logical cohesion — Correct. Functions perform similar or related operations (e.g., all I/O), selected via a control flag." },
  { w: 4, q: "Assume that you are an architect for a data-processing project. You have designed an application in such a way that the front-end component receives sensor data from devices, and the data flow from one component to the next component. Each component subsequently transforms the data and passes the transformed data to the next component. The final component passes the finally transformed data to a modelling and visualization unit that renders the data to the end-users. The architecture style that you are using in this application is ______", opts: ["Layered/tiered style", "Architectural style", "Pipe-and-filter style"], ans: 2, exp: "Pipe-and-filter style — Correct. Data flows through independent components (filters), each transforming and passing data along." },
  { w: 4, q: "A product group in a large company is working on developing a compiler for a platform. Within this product group, each of multiple teams is formed for reflecting the component maintained by the team, such as the compiler front-end team and the compiler back-end team. The reflection of such team organization is known as ______", opts: ["Brooks' Law", "Conway's Law", "Moore's Law", "Bell's Law"], ans: 1, exp: "Conway's Law — Correct. Systems mirror the organization's communication structure." },
  { w: 4, q: "In the UNIX pipe-and-filter architecture, which of the following is NOT true?", opts: ["The data get processed as soon as they arrive", "Filters know each other and share state", "Data can be passed in only one direction", "Filters can be implemented in parallel"], ans: 1, exp: "Filters know each other and share state — NOT true. Filters are independent and do not share state." },
  { w: 4, q: "Which of following is NOT a function of connectors?", opts: ["Interactions among components", "Encapsulates computation and/or data in the system", "Rules that govern those interactions"], ans: 1, exp: "Encapsulates computation and/or data — NOT a connector function; that is the role of Components." },
  { w: 4, q: "The component in the MVC pattern for receiving user-gesture events is named ______", opts: ["Model", "Controller", "View"], ans: 1, exp: "Controller — Correct. Handles user-gesture events." },
  { w: 4, q: "A chart, a pie chart, and a bar chart can show the same information from the database, due to which feature of MVC?", opts: ["Ability to provide multiple views", "Support for asynchronous technique", "The modification not affecting the entire model"], ans: 0, exp: "Ability to provide multiple views — Correct. Same model, multiple views." },
  { w: 4, q: "Which of the statement about software modularity is NOT correct with respect to benefits of software modularity?", opts: ["Modules are robust", "A module can use other modules", "Modules can be separately compiled and stored in a library", "Modules are mostly dependent"], ans: 3, exp: "Mostly dependent — NOT correct; modules should be mostly independent." },
  { w: 4, q: "Which of the following is the worst type of module cohesion among the following options?", opts: ["Logical Cohesion", "Temporal Cohesion", "Functional Cohesion", "Coincidental Cohesion"], ans: 3, exp: "Coincidental Cohesion — worst; no meaningful relationship between grouped functions." },
  {w:5, q: "In a UML class diagram, the ONLY mandatory compartment is:", opts: ["Attributes", "Operations", "Class name", "Visibility modifiers"], ans:2, exp: "Only the class name is required; attributes and operations compartments are optional."},
  {w:5, q: "Composition (filled diamond) differs from Aggregation (hollow diamond) because in Composition:", opts: ["Parts can exist independently of the whole", "Parts are created and destroyed with the whole", "Parts are shared across multiple composites", "The relationship is bidirectional"], ans:1, exp: "Composition: the whole owns the parts — they are created/destroyed together (lifecycles are shared)."},
  {w:5, q: "In a sequence diagram, time flows:", opts: ["Left to right", "Right to left", "Top to bottom", "Bottom to top"], ans:2, exp: "In sequence diagrams, time flows downward — earlier events appear higher on the diagram."},
  {w:5, q: "A UML class with an italic name is:", opts: ["An interface", "An abstract class", "A final class", "A singleton"], ans:1, exp: "Italic class name = abstract class (cannot be instantiated)."},
  {w:5, q: "The noun/verb extraction rule says: verbs in requirements become:", opts: ["Classes", "Attributes", "Operations or relationships", "Interface names"], ans:2, exp: "Verbs → operations (methods) or relationships (associations, generalizations, containment)."},
  {w:5, q: "Which noun filter removes words like \"sources\", \"information\", and \"system\" from class candidates?", opts: ["Redundant", "Vague", "Very General", "Instances"], ans:2, exp: "\"Very General\" filters out overly broad concepts like \"system\", \"data\", \"information\"."},
  {w:5, q: "In the sequence diagram from lecture, \"handleClaim\" is sent from:", opts: ["A Claim to the Mainframe", "An Adjudicator to A Claim", "The Mainframe to An Adjudicator", "The Post Office to A Claim"], ans:1, exp: "The adjudicator initiates by calling handleClaim on A Claim."},
  {w:5, q: "The \"alt\" interaction frame in a sequence diagram represents:", opts: ["A loop", "An optional interaction", "An if-else conditional", "A parallel interaction"], ans:2, exp: "\"alt\" = alternative — if-else conditional. Guards like [accept == true] and [else] separate the branches."},
  { w: 5, q: "In Class Diagrams, relationship between part and whole can be represented by which of the following?", opts: ["Generalization","Aggregation","Division","None of the above"], ans: 1, exp: "Aggregation — Aggregation models part-whole: parts can exist outside the whole; this is the correct answer." },
  { w: 5, q: "Consider the above Class Diagram when answering the following question:\\nWhich of the following statements is True about Author?", opts: ["An author may have written nothing.","Every author has contributed up to four articles.","Every author has contributed at least one article and at least one book.","Every book has up to one author."], ans: 0, exp: "An author may have written nothing. — Article side multiplicity is 0..*, Book side is also 0..*, Author can not have any Article or Book, that is, it can write nothing." },
  { w: 5, q: "Consider the Class diagram in Question 2\\nWhich relationship best describes the relationship between Publication and Article?", opts: ["Composition","Generalization","Aggregation","None of the above"], ans: 1, exp: "Generalization — The arrows pointing to Publication from Article and Book in the figure are hollow triangles, indicating inheritance (Generalization), and Article is-a Publication." },
  { w: 5, q: "Consider the class diagram from Question 2\\nWhich of the following statements is NOT True about the Class Diagram?", opts: ["Every publication has an Author.","Every Article has at least one Author","Not every Book has an Author","None of the above"], ans: 0, exp: "Every publication has an Author. — This is NOT True. Book-Author multiplicity 0..*, that is, a book can have no author; therefore not every Publication must have an Author." },
  { w: 5, q: "Based on this Class diagram, which of the following statements about the City and State classes is correct?", opts: ["No two cities can have the same name","Each city can be in zero or one state","Each city is in exactly one state","No two states can have the same name"], ans: 2, exp: "Each city is in exactly one state — There is a composition diamond on the State side, and the default multiplicity on the City side is 1, which means that each City belongs to exactly one State." },
  { w: 5, q: "P restaurant wants to automate ordering of pizzas for customers.\\n1. Two sizes: large, small\\n2. Each pizza can have two different sauces and two different bases\\n3. A customer can order a pizza or a drink\\n\\nWhich of the following is LEAST likely to be a class or attribute?", opts: ["Pizza","Order","Customer","Sauce","Drink","Size"], ans: 1, exp: "Order — In this scenario, Order is more likely to be an operation (method) than a persistent data entity; the requirement describes the action of placing an order." },
  { w: 5, q: "From the requirements stated in Question 6, which of the following is MOST likely to be an operation?", opts: ["Base","Order","Sauce","None of the above"], ans: 1, exp: "Order — Order describes the action/behavior of placing an order, and is more suitable as a method (operation) in OO design, such as customer.order(pizza)." },
