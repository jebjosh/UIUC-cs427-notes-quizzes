  { w: 5, q: "In UML diagrams, how are abstract classes distinguished from concrete classes?", opts: ["They are shown in the same way","Class names for abstract classes are shown in italics","Class names for concrete classes are shown in italics","Abstract classes are shown as boxes with bold outlines"], ans: 1, exp: "Class names for abstract classes are shown in italics — The UML specification stipulates that class names for abstract classes are shown in italics to distinguish them from concrete classes." },
  { w: 5, q: "Which of the following terms best describes the case where a Queue class is implemented using an internal instance of Array for storing the elements in the queue?", opts: ["Creation","Composition","Generalization","Singularity"], ans: 1, exp: "Composition — Composition is a strong part-whole relationship: Array is an internal component of Queue, and its life cycle follows Queue, conforming to the definition of Composition." },
  { w: 5, q: "Is the following statement True or False?\\nUML class diagrams are a good way to represent the algorithmic nature of the interactions between classes.", opts: ["True","False"], ans: 1, exp: "False — UML class diagrams are used to show the structure of a class (properties, methods, relationships) and do not represent algorithms or interaction sequences. To represent interactions, use Sequence Diagram or Activity Diagram." },
  { w: 5, q: "The vertical dimension of a sequence diagram represents which of the following?", opts: ["Message","Time","Objects","Replies"], ans: 1, exp: "Time — The vertical axis of a Sequence Diagram represents the passage of time, with time increasing from top to bottom." },
  { w: 5, q: "Is the following statement True or False?\\nClass Diagrams can show timing-related information.", opts: ["True","False"], ans: 1, exp: "False — Class Diagram is a static diagram that only describes the system structure (classes, attributes, methods, relationships), and timing information is represented by Sequence Diagram or Timing Diagram." },
  { w: 5, q: "Which of the following determines the order of events in a Sequence Diagram?", opts: ["The order of events based on their object-creation time","The order of events based on their triggering time","The order of events based on their importance","The order of events based on their duration time"], ans: 1, exp: "The order of events based on their triggering time — The events in the sequence diagram are arranged from top to bottom according to their triggering time, reflecting the actual execution/interaction sequence." },
  { w: 5, q: "Object-oriented design deals with which of the following (choose all that apply):", opts: ["Medium level of implementation details", "Low level of requirements details", "Only requirement details", "None of the above"], ans: 0, exp: "Medium level of implementation details is correct." },
  { w: 5, q: "Is the following statement True or False?\\nArchitecture and object-oriented design provide details involving Requirements and Implementation.", opts: ["True", "False"], ans: 0, exp: "True is correct." },
  { w: 5, q: "Which of the following are the benefits of Modeling Notations? (choose all that apply)", opts: ["Communication between engineers", "Assuring quality of design", "Reduction of code complexity", "None of the above"], ans: 0, exp: "Communication between engineers is correct." },
  { w: 5, q: "Is the following statement True or False?\\nUnified Modeling Language is a popular language for requirements and OO design.", opts: ["True", "False"], ans: 3, exp: "See Week 5 quiz for full explanation." },
  { w: 5, q: "Which of the following diagrams is a part of Unified Modeling Language (UML)?", opts: ["Class Diagram", "Interface Diagram", "Intention Diagram", "All of the above"], ans: 1, exp: "Interface Diagram is not the marked answer." },
  { w: 5, q: "Which of the following is NOT true about a class diagram?", opts: ["Class diagram provides an overall structure of a software system", "Class diagram shows classes for later implementation", "Class diagram provides detailed description including attributes and operations for each of the classes", "Class diagram provides information about how each class interacts with another"], ans: 3, exp: "This is the NOT true statement here." },
  { w: 5, q: "Is the following statement True or False?\\nInherited attributes must be listed in the class definition in a Class Diagram.", opts: ["True", "False"], ans: 3, exp: "See Week 5 quiz for full explanation." },
  { w: 5, q: "Which of the following can be used to describe an Association in a Class Diagram?", opts: ["Direction", "Multiplicity", "Aggregation/Composition", "All of the above"], ans: 1, exp: "Multiplicity can be used, but not alone." },
  { w: 5, q: "An operation in a class in a Class diagram does NOT contain which of the following?", opts: ["Return Type", "Method Parameters", "Visibility", "None of the above"], ans: 1, exp: "Method parameters can appear in an operation." },
  { w: 5, q: "Aggregation describes which of the following relationships?", opts: ["Parent-child relationship", "Whole-part relationship", "Calling relationship", "None of the above"], ans: 2, exp: "Calling relationship is not correct." },
  { w: 5, q: "Is the following statement True or False?\\nAssociation and composition indicate exactly the same relationship.", opts: ["True", "False"], ans: 2, exp: "See Week 5 quiz for full explanation." },
  { w: 5, q: "Which of the following can be used to describe an association relationship?", opts: ["Direction", "Multiplicity", "Both of the above", "None of the above"], ans: 0, exp: "Direction alone is incomplete here." },
  { w: 5, q: "0..1 indicates which of the following?", opts: ["1 instance", "At least one instance", "At most one instance", "Zero or more instances"], ans: 1, exp: "At least one instance is not correct." },
  { w: 5, q: "Is composition a stronger relation than association?", opts: ["Yes", "No"], ans: 1, exp: "No is not correct." },
  { w: 5, q: "What kind of relationship does a Generalization relationship describe?", opts: ["Whole-part relationship", "Parent-child relationship", "Calling relationship", "All of the above"], ans: 1, exp: "Parent-child relationship is correct." },
  { w: 5, q: "Which of the following is NOT true about an Abstract Class?", opts: ["Concrete classes override operations in an Abstract Class", "An Abstract Class can be instantiated directly", "Abstract Classes are different from interfaces", "None of the above"], ans: 3, exp: "None of the above is not correct." },
  { w: 5, q: "Is the following statement True or False?\\nIt is possible to create instances of an Interface.", opts: ["True", "False"], ans: 1, exp: "False is correct." },
  { w: 5, q: "What can be the purpose of a dotted line in a Class Diagram?", opts: ["To establish an association relationship between an Abstract Class and an Interface", "To establish a generalization relationship between two Interfaces", "To establish a generalization relationship between an Abstract Class and a Concrete Class", "To establish an implementing relationship between an Interface and a Concrete Class"], ans: 0, exp: "Not correct." },
  { w: 5, q: "Dependency relationship can describe which of the following relationships? (Choose all that apply)", opts: ["Class A calls a method in Class B", "Class A creates an instance of Class B", "Class A is a subclass of Class B", "Class A is independent of Class B"], ans: 2, exp: "This is not correct." },
  { w: 5, q: "Is the following statement True or False?\\nAll Interfaces are Abstract Classes as well.", opts: ["True", "False"], ans: 0, exp: "True is not correct." },
  { w: 5, q: "Is the following statement True or False?\\nExternal Actors are not included in a Class Diagram.", opts: ["True", "False"], ans: 2, exp: "See Week 5 quiz for full explanation." },
  { w: 5, q: "From requirements, nouns are often mapped to ______ and verbs are often mapped to ______ in a Class Diagram.", opts: ["Operations, Classes", "Relationships, Classes", "Classes, Operations", "None of the above"], ans: 0, exp: "Not correct." },
  { w: 5, q: "Mapping all nouns/verbs to classes/operations can result in which of the following?", opts: ["Redundancy", "Completeness", "Traceability", "All of the above"], ans: 2, exp: "Not correct." },
  { w: 5, q: "From the requirements of an online shopping platform stated below, identify candidate classes/objects.\\n1. A buyer must be able to purchase a product.\\n2. A seller must be able to contact the buyer.", opts: ["Buyer", "Seller", "Product", "Contact"], ans: 0, exp: "Buyer is correct." },
  { w: 5, q: "From Question 4, identify the operations/relationships from the requirements.", opts: ["Purchase", "Contact", "Sell", "None of the above"], ans: 0, exp: "Purchase is correct." },
  { w: 5, q: "Which of the following is NOT true about a Sequence Diagram (without interaction frame)?", opts: ["Shows sequence of actions in a single scenario", "Shows communication between objects/classes in a single scenario", "Shows the overall communication of the system in multiple scenarios", "None of the above"], ans: 0, exp: "This is true." },
  { w: 5, q: "Messages are represented by ________ in a Sequence Diagram.", opts: ["Horizontal Lines", "Vertical Lines", "Rectangular Boxes", "None of the above"], ans: 0, exp: "Horizontal Lines is correct." },
  { w: 5, q: "Which of the following is a purpose of using Activations?", opts: ["To impose conditions on classes/objects", "To indicate when a message can be sent", "To indicate whether the object is currently on the stack", "None of the above"], ans: 0, exp: "Not correct." },
  { w: 5, q: "Which of the following can be used to describe a message? (Choose all that apply)", opts: ["Name", "Arguments", "Condition", "Termination"], ans: 0, exp: "Name is correct." },
  { w: 5, q: "Is the following statement True or False?\\nA single Sequence Diagram typically represents one specific scenario of interaction between objects in a system.", opts: ["True", "False"], ans: 0, exp: "True is correct." },
  {w:6, q: "The Observer pattern intent is to define a ___ dependency between objects.", opts: ["1-to-1", "Many-to-many", "1-to-many", "Hierarchical"], ans:2, exp: "Observer: 1-to-many — one Subject notifies many Observers when its state changes."},
  {w:6, q: "In the GoF book, how many patterns are Behavioral?", opts: ["5", "7", "11", "23"], ans:2, exp: "GoF: 5 Creational + 7 Structural + 11 Behavioral = 23 total."},
  {w:6, q: "The Composite pattern is categorized as:", opts: ["Creational", "Structural", "Behavioral", "Architectural"], ans:1, exp: "Composite is a Structural pattern — it deals with how objects are composed into tree structures."},
  {w:6, q: "In the Interpreter pattern, a TerminalExpression is:", opts: ["A class that holds children", "A leaf node that implements interpret() for a grammar terminal", "The context holding global state", "The client that builds the tree"], ans:1, exp: "Terminal expressions are leaf nodes — they implement interpret() for the simplest grammar rules."},
  {w:6, q: "The main trade-off between Interpreter and Visitor: Visitor makes it easy to:", opts: ["Add new element types", "Add new operations", "Mix operations and elements", "Reduce class count"], ans:1, exp: "Visitor centralizes operations — adding a new operation = new Visitor class, no element changes needed."},
  {w:6, q: "Template Method uses ___ to vary algorithm steps; Strategy uses ___.", opts: ["Composition; inheritance", "Inheritance; composition", "Delegation; reflection", "Reflection; delegation"], ans:1, exp: "Template Method: inheritance (override steps in subclass). Strategy: composition (swap strategy object)."},
  {w:6, q: "The Iterator pattern hides the ___ of an aggregate object.", opts: ["Size", "Internal structure", "Operations", "Class hierarchy"], ans:1, exp: "Iterator hides whether the collection is an array, linked list, or tree — only exposes hasNext/next."},
  {w:6, q: "In the Strategy pattern, adding a new algorithm requires:", opts: ["Modifying the Context class", "Modifying all existing Strategy classes", "Adding a new ConcreteStrategy class only", "Changing the AbstractStrategy interface"], ans:2, exp: "Strategy: to add a new algorithm, just add a new ConcreteStrategy class — no other changes needed."},
  {w:6, q: "The FBIAgent/Mobster example illustrates Observer's ability to:", opts: ["Add methods to classes at runtime", "Eliminate circular dependencies between packages", "Broadcast to exactly one observer", "Replace inheritance with composition"], ans:1, exp: "Mobster depends only on the Observer interface, not on FBIAgent directly — breaking the cycle."},
  {w:6, q: "The Composite pattern's three objectives are Simplicity, Power, and:", opts: ["Performance", "Safety (uniform treatment of leaves and composites)", "Flexibility", "Inheritance"], ans:1, exp: "Safety: clients treat Leaf and Composite uniformly through the same Component interface — no special cases."},
  { w: 6, q: "Which of the following patterns does NOT belong to software Design pattern categories?", opts: ["Creational patterns", "Structural patterns", "Behavioral patterns", "None of the above"], ans: 3, exp: "None of the above — All three options (Creational, Structural, Behavioral) are legitimate GoF categories, so none of them fails to belong. The correct answer is 'None of the above'." },
  { w: 6, q: "Which of the following statements is true about the Observer pattern?", opts: [ "The state of the observed subject cannot be changed once initialized", "There can be only one observer", "It separates the display of object state from the object itself", "It separates the display and the display implementation" ], ans: 2, exp: "It separates the display of object state from the object itself — True; Observer decouples the subject (state holder) from its observers (display/reaction logic), allowing independent variation." },
  { w: 6, q: "Which of the following is true about Behavioral patterns?", opts: [ "Concerned with the process of object creation", "Deal with the composition of classes or objects", "Characterize the ways in which classes or objects interact and distribute responsibility", "None of the above" ], ans: 2, exp: "Characterize the ways in which classes or objects interact and distribute responsibility — This is the textbook definition of Behavioral patterns (e.g., Observer, Strategy, Iterator, Interpreter)." },
  { w: 6, q: "Which of the following statements is NOT true about using Design patterns?", opts: [ "Design patterns are reusable templates that help programmers solve some reoccurring issues in software development", "A class cannot participate in more than one Design pattern", "Using Design patterns improves code readability and flexibility" ], ans: 1, exp: "A class cannot participate in more than one Design pattern — This is NOT true. A single class can and often does participate in multiple design patterns simultaneously." },
  { w: 6, q: "Which of the following patterns allows a class behavior or its algorithm to be changed at run time?", opts: ["Composite pattern", "Visitor pattern", "Iterator pattern", "Strategy pattern"], ans: 3, exp: "Strategy pattern — Defines a family of algorithms, encapsulates each one, and makes them interchangeable at runtime without changing the client." },
  { w: 6, q: "Which of the following is NOT true about the Composite pattern?", opts: [ "The Leaf class implements all methods in the Component interface", "The Composite class implements methods to manipulate children", "The Component interface is the abstraction for all components, including composite ones", "The Component interface includes methods to manipulate children" ], ans: 3, exp: "The Component interface includes methods to manipulate children — NOT true. Child-manipulation methods (add, remove, getChild) belong to the Composite class, not the Component interface. The interface only declares common operations shared by all components." },
  { w: 6, q: "In a 3D object manipulation library, objects as well as groups of objects need to support similar 3D transformations (e.g. resize, rotation). Which pattern could be best suitable?", opts: ["Observer pattern", "Composite pattern", "Iterator pattern", "State pattern"], ans: 1, exp: "Composite pattern — Ideal here: individual 3D objects (Leaf) and groups of objects (Composite) both implement the same Component interface, allowing uniform application of transformations." },
  { w: 6, q: "A hedge fund uses multiple trading strategies that need to be switched on-the-fly during a trading session. Which pattern could be best suitable?", opts: ["Observer pattern", "Strategy pattern", "Iterator pattern", "Visitor pattern"], ans: 1, exp: "Strategy pattern — Designed exactly for this: encapsulate each trading strategy as an interchangeable object and swap them at runtime without changing the surrounding context." },
  { w: 6, q: "Which of the following is NOT True about the Interpreter pattern?", opts: [ "The interpret method has \"Context\" as one of its method parameter types", "The TerminalExpression class has no children and can be interpreted directly", "The abstract syntax tree is made with Context instances", "The NonTerminalExpression maintains a list of Expressions as children" ], ans: 2, exp: "The abstract syntax tree is made with Context instances — NOT true. The abstract syntax tree is composed of Expression instances (Terminal and NonTerminal). Context carries global information used during interpretation, but does not form the tree itself." },
  { w: 6, q: "What type of design pattern is the Strategy pattern?", opts: ["Behavioral pattern", "Creational pattern", "Structural pattern"], ans: 0, exp: "Behavioral pattern" },
  { w: 6, q: "True or False:\\nThe Strategy pattern implements different algorithms by using delegation.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "Which of the following is NOT an advantage of the Strategy pattern?", opts: ["Enables the client to choose from multiple ways to finish a task", "Hides implementation details about an algorithm from other classes", "The client does not need to know the availability of different strategies", "Can be used to eliminate a large number of if or case statements"], ans: 2, exp: "The client does not need to know the availability of different strategies" },
  { w: 6, q: "True or False:\\nUnlike the Strategy pattern, the template method pattern cannot be used for algorithm selection at run time.", opts: ["True", "False"], ans: 1, exp: "False" },
  { w: 6, q: "True or False:\\nThe Strategy pattern may increase the number of objects in the application.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "Which of the following is NOT a type of Design pattern?", opts: ["Creation pattern", "Structural pattern", "Behavioral pattern", "Logic pattern"], ans: 3, exp: "Logic pattern" },
  { w: 6, q: "Who first systematically categorized Design patterns?", opts: ["The Three Musketeers", "The Gang of Four", "The Big Four", "Richard Stallman"], ans: 1, exp: "The Gang of Four" },
  { w: 6, q: "Which type of design pattern is the Singleton pattern?", opts: ["Creation pattern", "Behavioral pattern", "Structural pattern", "Logic pattern"], ans: 0, exp: "Creation pattern" },
  { w: 6, q: "Which of the following is NOT true about Design patterns?", opts: ["Design patterns are available for Java programming language only", "Good use of design patterns makes a program simpler", "A design pattern is a description of classes and objects to solve a general design problem"], ans: 0, exp: "Design patterns are available for Java programming language only" },
  { w: 6, q: "True or False:\\nA Design pattern suitable for one programming language may not be directly applicable in another programming language.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "What type of Design pattern is the Observer pattern?", opts: ["Creational pattern", "Structural pattern", "Behavioral pattern"], ans: 2, exp: "Behavioral pattern" },
  { w: 6, q: "Which of the following architectures usually involves the Observer pattern?", opts: ["Active record", "Model-View-Controller", "Data transfer object", "Data access object"], ans: 1, exp: "Model-View-Controller" },
  { w: 6, q: "Which class implements the visual representation of data when the Observer pattern is used for multiple displays of the same data?", opts: ["Observer", "Observable", "ConcreteObserver", "ConcreteObservable"], ans: 2, exp: "ConcreteObserver" },
  { w: 6, q: "Suppose you are implementing a subscription service for a video website, the User should be a subclass of ________ and the Channel should be a subclass of ________.", opts: ["Observer; Observable", "Observer; Observer", "Observable; Observer", "Observable; Observable"], ans: 0, exp: "Observer; Observable" },
  { w: 6, q: "Which of the following is NOT a consequence of the Observer pattern?", opts: ["Reduce couplings", "Multiple objects can be updated automatically when one object changes state", "Subject does not need to know when update happens", "Observer can \"pull\" information from the Subject"], ans: 2, exp: "Subject does not need to know when update happens" },
  { w: 6, q: "What type of Design pattern is the Composite pattern?", opts: ["Behavioral", "Structural", "Creational"], ans: 1, exp: "Structural" },
  { w: 6, q: "True or False:\\nComposite pattern should be used when multiple classes share similar code.", opts: ["True", "False"], ans: 1, exp: "False" },
  { w: 6, q: "True or False:\\nIn the Composite pattern, the addChild method can be called on a Composite object, but not on a Leaf object.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "Which of the following is NOT a desirable situation to use the Composite pattern?", opts: ["The problem is to represent a \"whole-part\" hierarchical relationship", "All Composite classes declare a one-to-many \"has a\" relationship to the interface", "All Composite and Leaf classes declare an \"is a\" relationship to the interface", "The operations on the Composite are difficult to be delegated to its children directly"], ans: 3, exp: "The operations on the Composite are difficult to be delegated to its children directly" },
  { w: 6, q: "Which of the following is not an approach to ensure consistency when a component knows its parent?", opts: ["Update the parent of Components only in the addChild operation", "Make addChild only available to Composites", "Make client responsible for keeping track of the parent"], ans: 2, exp: "Make client responsible for keeping track of the parent" },
  { w: 6, q: "Which pattern can be used to represent the syntax tree?", opts: ["Decorator", "Composite pattern", "Bridge", "Proxy"], ans: 1, exp: "Composite pattern" },
  { w: 6, q: "What type of Design pattern is the Interpreter pattern?", opts: ["Structural pattern", "Behavioral pattern", "Creational pattern"], ans: 1, exp: "Behavioral pattern" },
  { w: 6, q: "When should one use the Interpreter Pattern?", opts: ["To represent whole-part hierarchies", "When designing an automated translation system", "To define the grammar of a language and specify how to evaluate sentences in the language", "To create an object-oriented state machine"], ans: 2, exp: "To define the grammar of a language and specify how to evaluate sentences in the language" },
  { w: 6, q: "Each rule in the grammar corresponds to _____.", opts: ["An Expression instance", "An Expression subclass", "A Context instance", "A Context subclass"], ans: 1, exp: "An Expression subclass" },
  { w: 6, q: "Which of the following is NOT true about Context?", opts: ["Context provides input and output", "Context can be used to record states", "Context defines evaluation rules for expressions"], ans: 2, exp: "Context defines evaluation rules for expressions" },
  { w: 6, q: "What type of Design pattern is the Visitor pattern?", opts: ["Creational pattern", "Structural pattern", "Behavioral pattern"], ans: 2, exp: "Behavioral pattern" },
  { w: 6, q: "Which of the following is an advantage of the Visitor pattern?", opts: ["It is easy to add operations", "It is easy to add elements", "Elements do not need to be changed when adding new operations"], ans: 0, exp: "It is easy to add operations" },
  { w: 6, q: "True or False:\\nThe subclass of Element should have a visit operation for each concrete Visitor class.", opts: ["True", "False"], ans: 1, exp: "False" },
  { w: 6, q: "You are implementing a \\\"PrettyPrint\\\" printer class for a set of classes. You want to add \\\"UglyPrint\\\" and \\\"FancyPrint\\\" printer classes later. Which class should PrettyPrint inherit from?", opts: ["Element", "Visitor", "Context", "Expression"], ans: 1, exp: "Visitor" },
  { w: 6, q: "True or False:\\nIf a new Element is added, all visitor classes are affected.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "Which type of Design pattern is the template method pattern?", opts: ["Behavioral pattern", "Creational pattern", "Structural pattern"], ans: 0, exp: "Behavioral pattern" },
  { w: 6, q: "Which of the following is TRUE about the template method pattern?", opts: ["The skeleton method in the abstract class should be made final", "The concrete classes should override the templateMethod()", "The AbstractClass can be made into an interface"], ans: 0, exp: "The skeleton method in the abstract class should be made final" },
  { w: 6, q: "True or False:\\nIn the template method pattern, the skeleton of the algorithm must be first specified.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "True or False:\\nThe template method pattern implements multiple algorithms by using delegation.", opts: ["True", "False"], ans: 1, exp: "False" },
  { w: 6, q: "True or False:\\nIn the template method pattern, the Concrete classes are highly coupled to the abstract class.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "What type of Design pattern is the Iterator pattern?", opts: ["Behavioral pattern", "Creational pattern", "Structural pattern"], ans: 0, exp: "Behavioral pattern" },
  { w: 6, q: "True or False:\\nThe underlying data structure must be exposed to the iterator class.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "True or False:\\nThe Iterator pattern can be used to traverse the tree structure of a Composite tree.", opts: ["True", "False"], ans: 0, exp: "True" },
  { w: 6, q: "Which of the following is NOT a method normally implemented by an iterator?", opts: ["loop()", "next()", "hasNext()"], ans: 0, exp: "loop()" },
  { w: 6, q: "True or False:\\nThe iterator() method in the Aggregate class should return a concrete iterator.", opts: ["True", "False"], ans: 1, exp: "False" },
  {w:7, q: "Validation answers which question?", opts: ["Are we building the product right?", "Are we building the right product?", "Are we building the product efficiently?", "Is the product free of bugs?"], ans:1, exp: "Validation: \"right product?\" Verification: \"product right?\" (IEEE 2017)."},
  {w:7, q: "Which is NOT one of the four testing activities?", opts: ["Test Design", "Test Automation", "Test Implementation", "Test Evaluation"], ans:2, exp: "\"Test Implementation\" is not a named activity. The four are: Design, Automation, Execution, Evaluation."},
  {w:7, q: "Dijkstra's famous quote states testing shows:", opts: ["The absence of bugs", "The presence, not the absence, of bugs", "100% correctness", "Code quality"], ans:1, exp: "\"Testing shows the presence, not the absence of bugs.\" — Dijkstra, 1972 Turing Award."},
  {w:7, q: "Which PIE condition states the fault-containing statement must execute?", opts: ["Propagation", "Infection", "Execution", "All three simultaneously"], ans:2, exp: "E = Execution: the faulty statement must run. I = Infection: must create wrong state. P = Propagation: must reach an observable output."},
  {w:7, q: "Black-box testing is good at detecting faults of:", opts: ["Commission (extra logic)", "Omission (missing logic)", "Performance", "Security"], ans:1, exp: "Black-box (spec-based): good at finding missing logic. White-box (code-based): good at finding extra/wrong logic."},
  {w:7, q: "Boundary Value Analysis tests:", opts: ["Mid-range values only", "Values at and just beyond the boundary of equivalence classes", "Random values", "All possible inputs"], ans:1, exp: "BVA: test at the boundary (e.g., a, a-1, a+1, b, b-1, b+1) where faults tend to cluster."},
  {w:7, q: "100% branch coverage requires:", opts: ["Every method called at least once", "Every statement executed", "Every predicate evaluated to both true and false", "All condition combinations tested"], ans:2, exp: "Branch/decision coverage: every if/while/for must evaluate to both true and false."},
  {w:7, q: "Loop coverage requires testing ___ pass(es) through the loop body.", opts: ["Only 0 and 1", "Only 1 and many", "0, 1, 2, and many", "Only many"], ans:2, exp: "Loop coverage: 0 passes (skip), 1 pass, 2 passes, and n>2 passes — all four cases."},
  {w:7, q: "The PIE model explains why 100% statement coverage is necessary because:", opts: ["Without it, tests are not automated", "Without executing a statement, its fault can never cause a failure", "100% coverage proves correctness", "It satisfies the test oracle"], ans:1, exp: "PIE condition E (Execution): if a faulty statement never runs, its fault literally cannot manifest as a failure."},
  {w:7, q: "Which activity requires \"domain knowledge\" as its key expertise?", opts: ["Test Design", "Test Automation", "Test Execution", "Test Evaluation"], ans:3, exp: "Test Evaluation requires domain knowledge to judge whether actual vs expected results are correct."},
  {w:7, q:"Which of the following is a type of code coverage measurement?", opts:["Statement coverage", "Method coverage", "Loop coverage", "All of the above"], ans:3, exp:"All listed items are types of code coverage measurements."},
  {w:7, q:"Which of the following type of code coverage measures the lines covered by test cases?", opts:["Method coverage", "Statement coverage", "Branch/Decision coverage", "Condition/Predicate coverage"], ans:1, exp:"Statement coverage measures whether lines/statements are executed by test cases."},
  {w:7, q:"Which of the following types of code coverage aims to ensure that each one of the possible branches from each decision point is executed at least once?", opts:["Branch/Decision coverage", "Loop coverage", "Method coverage", "Statement coverage"], ans:0, exp:"Branch/Decision coverage requires each possible branch outcome to be executed at least once."},
  {w:7, q:"Which of the following statements about infeasible paths is NOT correct?", opts:["Infeasible paths are those paths which can't be tested and verified by any set of possible input values.", "Infeasible paths are hard to detect by automation process.", "We prefer using Black box testing to find out infeasible paths.", "It usually requires domain knowledge for programmers to identify an infeasible path."], ans:2, exp:"Black-box testing is not the preferred way to identify infeasible paths; this statement is not correct."},
  {w:7, q:"Which of the following is NOT a purpose of testing?", opts:["To improve code quality", "To spot code faults", "To document code", "To guarantee code is fully correct"], ans:3, exp:"Testing cannot guarantee that code is fully correct."},
  {w:7, q:"Which of the following do NOT belong to the types of test activities?", opts:["Test Design", "Test Automation", "Test Implementation", "Test Evaluation"], ans:2, exp:"Test implementation is not one of the named core test activities."},
  {w:7, q:"Which of the following test activities embeds test values into executable scripts?", opts:["Test Design", "Test Automation", "Test Implementation", "Test Execution"], ans:1, exp:"Test automation embeds test values into executable scripts."},
  {w:7, q:"Which of the following statements about testing activities is correct?", opts:["Designing tests requires relatively little knowledge about the domain and programs.", "In order to embed test values into executable scripts, one needs to understand the theory very well.", "It is always efficient to assign the same person for all testing activities.", "Test automation is useful to have but could also be boring to construct."], ans:3, exp:"This is the correct statement from the source material."},
  {w:7, q:"Which of the following statements about test cases is correct?", opts:["Test cases cannot be used as documents as they are considered as two very different categories.", "Only developers can construct test case for their programs.", "The process of developing test cases can also help developers to understand the requirements."], ans:2, exp:"Constructing test cases can improve understanding of requirements."},
  {w:7, q:"When should we write test cases?", opts:["Before code is written", "While writing code", "After code is written", "All of above"], ans:3, exp:"All of these timings are possible."},
  {w:7, q:"Which statement about manual testing and automated testing is NOT correct?", opts:["When regression tests are conducted very often, we should prefer doing automated testing.", "To test a Graphics Interface, we should build automated tests after the interface design is stable.", "Tests that don't require re-execution should be done manually.", "Automated tests always finds more bugs than manual tests."], ans:3, exp:"Automated tests do not always find more bugs than manual tests."},
  {w:7, q:"Which of the following statements is true about tests?", opts:["Tests must be written in the form of code", "User interfaces cannot be tested", "Projects can have more test code than source code", "Tests can always spot bugs"], ans:2, exp:"Projects can indeed have more test code than production code."},
  {w:7, q:"Which of the following statements about writing tests as a developer is NOT correct?", opts:["Developers cannot always detect all faults even if they fully understand their implementations.", "More people are encouraged to engage in writing tests in addition to developers.", "When developers construct test suites, they may have a bias on software code or functions.", "Only QA developers should develop test cases since they are experts in testing area."], ans:3, exp:"Writing tests is not only for QA developers; this is the incorrect statement."},
  {w:7, q:"Which of the following is true about Black box testing?", opts:["It is not feasible to thoroughly exercise all potential tests inputs.", "Tests are written with knowledge of the internal workings to thoroughly test what is happening on the inside of the code.", "Black box testing is good at finding faults of extra logic.", "Black box testing is good and better for finding crashes, out of bounds failures, and file not closed failures."], ans:2, exp:"According to the source material, black-box testing is good at finding faults of extra logic."},
  {w:7, q:"Which of the following statements about White box testing is NOT correct?", opts:["Methods like Equivalence Class and Boundary Value Analysis can also be applied in White box testing.", "Maintaining White box test scripts could be very difficult if implementation details keep changing frequently.", "White box testing is usually very simple, so it does not require knowledge of programming and implementation"], ans:2, exp:"White-box testing does require programming and implementation knowledge; this is the incorrect statement."},
  {w:7, q:"A developer called Math.log(5) function that was supposed to return the natural logarithm value of the input, but returns 125 instead. According to the lecture slides, this is an example of:", opts:["Error", "Failure", "Fault"], ans:2, exp:"The wrong implementation is a fault."},
  {w:7, q:"According to the PIE model, which of the following conditions is NOT correct for a failure to be observed?", opts:["The location or locations in the program that contain the fault must be reached.", "The state of the program must be incorrect.", "The infected state must NOT propagate to cause some output of the program to be incorrect."], ans:2, exp:"Propagation IS required for a failure to be observed, so this statement is not correct."},
  {w:7, q:"Which of the following is NOT a metric for code coverage?", opts:["Method coverage", "Branch coverage", "Statement coverage", "Parameter coverage"], ans:3, exp:"Parameter coverage is not one of the standard code coverage metrics listed here."},
  {w:7, q:"\"Dividing input conditions into groups and testing each group of inputs\" describes which of the following techniques for Black box testing?", opts:["Boundary Value Analysis", "Equivalence Class Partitioning", "Decision Table Testing", "Use case testing"], ans:1, exp:"Equivalence class partitioning divides inputs into groups/classes."},
  {w:7, q:"Which of the following is NOT a valid purpose of software testing?", opts:["Determine whether the software is sufficiently qualified for the release.", "Finding faults in the software.", "Determine which parts of the software need more testing.", "Guaranteeing there are NO faults in the software."], ans:3, exp:"Testing cannot guarantee the complete absence of faults."},
  {w:7, q:"Which of the following statements about developers writing tests is NOT correct?", opts:["Developers can always detect all faults since they understand their implementations.", "Developers may have biases when writing software code and designing functions.", "More people are encouraged to engage in writing tests in addition to developers."], ans:0, exp:"Developers cannot always detect all faults just because they know the implementation."},
  {w:7, q:"When do we usually want to write Unit tests?", opts:["Prior to Integration phase", "Prior to designing phase", "After maintenance phase", "During requirement phase"], ans:0, exp:"Unit tests are usually written before integration, while focusing on individual units."},
  {w:7, q:"Is the following statement True or False: Validation ensures that the new method meets the requirements for its intended use.", opts:["True", "False"], ans:0, exp:"This is true according to the source material."},
  {w:7, q:"Is the following statement True or False: We only need to run test cases before releasing the software to our customers.", opts:["True", "False"], ans:1, exp:"Correct — testing is not only a pre-release activity."},
  {w:7, q:"When do we prefer automated testing to manual testing?", opts:["When regression tests are conducted very often.", "Tests that don't require re-execution.", "The software GUI rarely gets updated."], ans:0, exp:"Frequent regression testing strongly favors automation."},
  {w:7, q:"When do we prefer manual testing instead of automated testing?", opts:["When we want to use tests as documentation.", "When the software is not stable.", "When tests only gets executed once."], ans:2, exp:"Manual testing is preferred when a test will only be executed once."},
  {w:7, q:"Which of the following is NOT an advantage of test automation?", opts:["It can help in identifying high priority test cases.", "It can be run over and over again.", "It is good for validating functional flows.", "It improves the efficiency of testing."], ans:0, exp:"Identifying high-priority test cases is not an advantage of automation itself."},
  {w:7, q:"Which of the following statements on test cases is NOT correct?", opts:["Test cases can document faults", "Test cases can document code", "One can only build test cases for a specific program if the program is developed by him/her.", "The process of developing test cases can also help find problems in the requirements or design of an application."], ans:1, exp:"Test cases are not the same as code documentation; this is the incorrect statement."},
  {w:7, q:"Which of the following is a type of testing activity?", opts:["Test Evaluation", "Test Design", "Test Execution", "All of them"], ans:3, exp:"All listed options are testing activities."},
  {w:7, q:"When we conduct tests, the procedure of coming up with a set of interesting input values is considered as:", opts:["Test Evaluation", "Test Automation", "Test Execution", "Test Design"], ans:3, exp:"Choosing interesting input values is test design."},
  {w:7, q:"When we conduct tests, the procedure of understanding the output of the execution of test cases and reporting or documenting the results is considered as:", opts:["Test Design", "Test Automation", "Test Execution", "Test Evaluation"], ans:3, exp:"Understanding outputs and documenting results is test evaluation."},
  {w:7, q:"Which of the following statements about assigning testing personnel is NOT correct?", opts:["Conducting testing design requires the most technical knowledge", "You do not need to know how to program to conduct test automations", "In order to evaluate the test results, domain knowledge is required"], ans:0, exp:"This is the incorrect statement according to the source material."},
  {w:7, q:"A developer mistyped a variable as \"buildf\" while he was looking for the variable \"build\". According to the lecture slides, this is an example of:", opts:["Mistake", "Failure", "Error"], ans:0, exp:"The human action is a mistake."},
  {w:7, q:"An incorrect implementation of an algorithm results in program crashes by the test oracle. According to the lecture slides, this is an example of:", opts:["Failure", "Fault", "Error"], ans:0, exp:"A crash observed by the oracle is a failure."},
  {w:7, q:"A developer called sqrt(5) function that was supposed to return the square root value of the input but the developer got 25 instead. According to the lecture slides, this is an example of:", opts:["Error", "Failure", "Mistake"], ans:0, exp:"The incorrect internal/computed state is an error."},
  {w:7, q:"According to the PIE model, what conditions are necessary for a failure to be observed?", opts:["The location or locations in the program that contain the fault must be reached.", "The state of the program must be incorrect.", "The infected state must propagate to cause some output of the program to be incorrect.", "All of the above."], ans:3, exp:"All three PIE conditions are necessary."},
  {w:7, q:"Which of the following is NOT an advantage of using Black-box testing?", opts:["Tests are done from a user's perspective and will help in finding inconsistencies between the specifications and real behavior.", "Test cases can be developed as soon as the specifications are ready.", "It can cover most of the potential execution paths.", "Testers do not need to know how the programs are implemented."], ans:2, exp:"Covering execution paths is more associated with white-box testing; this is not an advantage of black-box testing."},
  {w:7, q:"Which of the following is a disadvantage of using Black box testing?", opts:["Maintaining test suites become harder if the implementation changes too frequently.", "It is hard to cover all the program execution paths.", "Testers need a thorough knowledge of the implementation details."], ans:1, exp:"Black-box testing does not target internal execution paths, making path coverage hard."},
  {w:7, q:"Suppose we want to test a new generic sorting algorithm using Black box testing and we have several different sets of testing inputs. Which following set of testing values ONLY contains inputs from an equivalent class?", opts:["[1, 2, 3, 4, 5], ['a', 'b', 'c'], ['aa', 'ab', 'ac', 'bd']", "[7, 9, 5, 4, 1], ['a', 'b', 'c'], ['a', 'a', 'b', 'b', 'c', 'c']", "[4, 3, 1, 2, 5], [1, 2, 3, 5], [42, 10, 23, 1], ['3', 'B', 'c']"], ans:0, exp:"These inputs are all valid lists of comparable, unique, sorted-ish values within one intended class per set."},
  {w:7, q:"Which of the following software testing levels do we typically NOT prefer using for Black box testing?", opts:["Acceptance Testing", "Unit Testing", "Integration Testing", "System Testing"], ans:1, exp:"Unit testing typically prefers white-box testing, so black-box is less preferred here."},
  {w:7, q:"\"Dividing the input conditions into groups and testing each group of inputs\" describes which of the following techniques for Black box testing?", opts:["Use case testing", "Decision Table Testing", "Equivalence Class Partitioning", "Boundary Value Analysis"], ans:2, exp:"Equivalence class partitioning divides inputs into groups/classes."},
  {w:7, q:"Which of the following is an advantage of using White- box testing?", opts:["Tests are done from a user's perspective and will help in finding inconsistencies between the specifications and real behavior.", "Testers do not need to know how the programs are implemented.", "Testers are based on internal code structure, allowing for thorough path and branch coverage."], ans:2, exp:"This is the key advantage of white-box testing."},
  {w:7, q:"Which of the following is a disadvantage of using White-box testing?", opts:["Programmers need a thorough knowledge of implementations to develop a White- box test suite.", "Many program paths will be left untested.", "Without clear specifications, test cases will be hard to design."], ans:0, exp:"This is a disadvantage of white-box testing."},
  {w:7, q:"Which of the following is a correct description of the main difference between Black box testing and White-box testing?", opts:["The internal structure, design or implementation of the item is given to the test developers.", "Black box testing generally requires testers to have domain knowledge (e.g. programming language of the software implementation)", "White-box testing cannot be applied during Integration test."], ans:0, exp:"This describes white-box testing versus black-box testing."},
  {w:7, q:"Which of the following statements about White- box testing is correct?", opts:["As a test developer, I do not need to know the details of implementations to develop my White box test suite.", "White- box testing is typically conducted before conducting Black box testing.", "Methods like Equivalence Class and Boundary Value Analysis can also be applied in White- box testing."], ans:2, exp:"This statement is correct according to the source material."},
  {w:7, q:"At which software testing level do we typically prefer using White-box Testing?", opts:["Unit Testing", "System Testing", "Acceptance Testing"], ans:0, exp:"White-box testing is typically preferred at the unit-testing level."},
  { w: 7, q: "Which of the following is true about Black-box testing?", opts: [ "It is not feasible to thoroughly exercise all potential test inputs.", "Tests are written with knowledge of the internal workings to thoroughly test what is happening on the inside of the code.", "Black-box testing is good at finding faults of extra logic.", "Black-box testing is better for finding crashes, out of bounds failures, and file not closed failures." ], ans: 0, exp: "Correct — Black vs white tab: input space is enormous, so exhaustive black-box testing is infeasible; you sample (ECP/BVA)." },
  { w: 7, q: "Which of the following statements about White-box testing is NOT correct?", opts: [ "Methods like Equivalence Class and Boundary Value Analysis can also be applied in White-box testing.", "Maintaining White-box test scripts could be very difficult if implementation details keep changing frequently.", "White-box testing is usually very simple, so it does not require knowledge of programming and implementation." ], ans: 2, exp: "This is NOT correct — White-box requires programming and internal knowledge; the notes say it is not “easy” and demands coding skill (comparison table + exam tip)." },
  { w: 7, q: "A developer called Math.log(5) which was supposed to return the natural logarithm of the input, but returns 125 instead. This is an example of:", opts: ["Error","Failure","Fault"], ans: 0, exp: "Correct — Error / fault / failure table: an error is the human mistake while coding; the walk-through uses the same Math.log vs Math.pow style example." },
  { w: 7, q: "\\\"Dividing input conditions into groups and testing each group of inputs\\\" describes which technique for Black-box testing?", opts: ["Boundary Value Analysis","Equivalence Class Partitioning","Decision Table Testing","Use case testing"], ans: 1, exp: "Correct — ECP splits inputs into equivalence classes and picks representatives (techniques table: partition, representative)." },
  { w: 7, q: "Validation is defined as determining whether a system satisfies:", opts: ["The conditions set at the start of the current development phase","Specified requirements — the right product?","Only the non-functional requirements","The internal design document"], ans: 1, exp: "Correct — Validation checks against specified requirements: 'Are we building the right product?' (IEEE 2017)." },
  { w: 7, q: "Test Execution activity requires which level of knowledge?", opts: ["Deep domain knowledge","Technical testing expertise","Very little knowledge","Strong programming background"], ans: 2, exp: "Correct — Test Execution simply runs scripts and records results; very little knowledge is required (Testing Activities tab)." },
  { w: 7, q: "Which code coverage level checks that every conditional predicate has been both true and false?", opts: ["Method coverage","Statement coverage","Branch/decision coverage","Loop coverage"], ans: 2, exp: "Correct — Branch/decision coverage: every if/while/for must evaluate to both true and false." },
  { w: 7, q: "An infeasible path in a program is one that:", opts: ["Takes too long to execute","Can never be reached by any test input","Is always executed first","Only executes on certain hardware"], ans: 1, exp: "Correct — An infeasible path cannot be triggered by any possible input; 100% coverage cannot cover it (Code Coverage tab)." },
  { w: 7, q: "The mistake → fault → error → failure chain: what does 'error' specifically refer to?", opts: ["The incorrect line of code","The incorrect program state during execution","The wrong output the user sees","The developer's misunderstanding"], ans: 1, exp: "Correct — Error: the difference between computed/observed and the correct value — an incorrect intermediate state (Fault & Failure tab)." },
  { w: 7, q: "For range input [a, b] in Boundary Value Analysis (integer), which test values are required?", opts: ["Only a and b","a, b, a+1, b-1","a, a+1, a-1, b, b+1, b-1","Only mid-range values"], ans: 2, exp: "Correct — BVA for integer range: a, a-1, a+1, b, b-1, b+1 — at boundary and ±1 on each side." },
  { w: 7, q: "Which condition of PIE explains why passing all tests does NOT guarantee zero bugs?", opts: ["Execution — some statements were not executed","Infection — the fault never corrupted state","Propagation — the error never reached an observable output","All three together"], ans: 3, exp: "Correct — Even with 100% statement coverage, a fault might execute (E) but not infect state (I), or infect state but not propagate to an observable output (P). All three together explain why tests cannot prove correctness." },
  { w: 7, q: "Testing guidelines for collections say to test the collection with exactly one element because:", opts: ["It is faster","Edge cases near empty are common fault locations","It uses less memory","It satisfies statement coverage alone"], ans: 1, exp: "Correct — The boundary between 'empty' and 'non-empty' is a common fault location; testing with exactly 1 element catches off-by-one errors near empty (Equivalence Partitioning tab)." },
  { w: 7, q: "Scenario-based tests are written based on:", opts: ["Random inputs","User stories and user workflows","The internal code structure","Boundary values only"], ans: 1, exp: "Correct — Scenario-based tests derive cases from user stories and realistic end-to-end workflows (Test Cases tab: kinds of tests)." },
  { w: 7, q: "White-box testing is typically conducted:", opts: ["Before black-box testing","After black-box testing","Only on unit tests","Only on system tests"], ans: 1, exp: "Correct — White-box testing is typically conducted after black-box testing to cover remaining code paths (White-Box tab: 'typically after black-box')." },
  { w: 7, q: "A test with balance=0, calAmount() returning 10 with oracle 'assertTrue(amount==10)' — which element of PIE is demonstrated when the fault (balance*3 instead of *2) is NOT triggered?", opts: ["Execution fails — the faulty statement never runs","Infection fails — state is not corrupted (0*3=0=0*2)","Propagation fails — the error does not reach output","All three conditions are met"], ans: 1, exp: "Correct — When balance=0, 0*3=0 and 0*2=0 — same result. The fault executes (E satisfied) but the state is NOT infected (I fails). This is a masked fault." },
  { w: 7, q: "Loop coverage requires which of the following test executions?", opts: ["0 iterations only","1 and many iterations","0, 1, 2, and many (n>2) iterations","Only many iterations"], ans: 2, exp: "Correct — Loop coverage requires: skip (0), single (1), double (2), and many (n>2) passes (Code Coverage tab)." },
  { w: 7, q: "Regression tests are run to:", opts: ["Find new features to implement","Verify that existing behavior still works after changes","Measure performance under load","Explore the system for unknown faults"], ans: 1, exp: "Correct — Regression tests verify that changes (fixes, refactors, new features) have not broken previously working functionality (Test Cases tab: regression)." },
  { w: 7, q: "Which testing activity requires the most expertise and why?", opts: ["Test Execution — because running scripts is complex","Test Design — because it requires domain knowledge and testing expertise to identify meaningful cases","Test Automation — because it requires the most programming skill","Test Evaluation — because it requires management approval"], ans: 1, exp: "Correct — Test Design requires both domain knowledge (what should the software do?) and testing expertise (how to find meaningful fault-revealing cases). It is the most knowledge-intensive activity." },
  { w: 7, q: "True or False: White-box testing can still catch missing logic (faults of omission).", opts: ["True","False"], ans: 1, exp: "Correct — White-box tests only see code that exists. If a requirement was simply never implemented (omission), there are no code paths to cover — white-box cannot detect what was never written." },
  {w:8, q: "Unit test quality requires BOTH:", opts: ["High LOC and fast execution", "High coverage AND good assertions", "Many test methods and few assertions", "Low coupling and high cohesion"], ans:1, exp: "Experience: just high coverage or many assertions alone is insufficient — both together are required."},
  {w:8, q: "assertEquals() for double values requires a third argument because:", opts: ["Java requires it for overloading", "Floating-point arithmetic is imprecise — exact equality is unreliable", "It improves performance", "JUnit 5 changed the API"], ans:1, exp: "0.1 + 0.2 != 0.3 in floating-point. The delta specifies the acceptable error margin."},
  {w:8, q: "assertSame() vs assertEquals() for objects:", opts: ["They are identical", "assertSame checks reference equality (==); assertEquals checks value equality (.equals())", "assertEquals checks == ; assertSame checks .equals()", "Both use .equals()"], ans:1, exp: "assertSame: same object in memory (==). assertEquals: same value (.equals())."},
  {w:8, q: "When assumeTrue() condition is false, the test outcome is:", opts: ["FAIL", "ERROR", "ABORTED (skipped)", "PASS"], ans:2, exp: "Assumption failure = ABORTED (test is skipped, not failed). Assertion failure = FAIL."},
  {w:8, q: "@BeforeEach annotated method runs:", opts: ["Once before all tests in the class", "Before each individual test method", "After each test", "Only before parameterized tests"], ans:1, exp: "@BeforeEach runs before EACH test method — typically used to reset state for test isolation."},
  {w:8, q: "Which annotation provides comma-separated inline argument rows to a parameterized test?", opts: ["@ValueSource", "@EnumSource", "@CsvSource", "@MethodSource"], ans:2, exp: "@CsvSource provides comma-separated string literals inline: @CsvSource({\"foo, 1\", \"bar, 2\"})."},
  {w:8, q: "The 4A pattern for parameterized tests is:", opts: ["Analyze, Arrange, Act, Assert", "Assume, Arrange, Act, Assert", "Apply, Arrange, Automate, Assert", "Assume, Automate, Act, Assess"], ans:1, exp: "4A: Assume (preconditions) → Arrange (setup) → Act (call method) → Assert (verify result)."},
  {w:8, q: "Test Generalization Step 2 is:", opts: ["Parameterize values", "Generalize the oracle (replace constants with expressions)", "Add assumptions", "Cross-test generalize"], ans:1, exp: "Step 2: replace constant values in assertions with general expressions (e.g., 1 → oldSize + 1)."},
  {w:8, q: "assertAll() is different from multiple separate assertEquals() calls because:", opts: ["It runs faster", "All assertions execute even if some fail; all failures are reported together", "It requires a list, not lambdas", "It only checks null values"], ans:1, exp: "assertAll: all assertions run regardless of earlier failures — all issues are reported at once."},
  {w:8, q: "assertThrows() is used to:", opts: ["Throw an exception manually", "Verify that executing a code block throws a specific exception type", "Assert that no exception is thrown", "Log expected exceptions"], ans:1, exp: "assertThrows(Type.class, () -> { code }) verifies the code throws the expected exception."},
  { w: 8, q: "True or False: A reason that a big test is worse than several small tests is that the later assertions won't be executed if the preceding assertion fails.", opts: ["True","False"], ans: 0, exp: "Big tests often stop at the first failing assertion, so later checks are skipped." },
  { w: 8, q: "Which of the following is a valid JUnit API method signature?", opts: ["static void assertEquals(char expected, char actual, double delta)","static void assertEquals(double expected, double actual, double delta)","static void assertEquals(long expected, long actual, double delta)"], ans: 1, exp: "The delta overload is used for floating-point comparison (double/float)." },
  { w: 8, q: "Which of the following is correct about JUnit?", opts: ["It provides test runners to run tests","JUnit tests can run automatically and self-check results","Both A and B","Neither A nor B"], ans: 2, exp: "JUnit provides test runners and automatic pass/fail feedback." },
  { w: 8, q: "True or False: Testing can be used to check whether software works correctly as per functional requirements.", opts: ["True","False"], ans: 0, exp: "That statement matches the core purpose of software testing." },
  { w: 8, q: "True or False: Annotating a public void method with @AfterEach causes it to run before each @Test method.", opts: ["True","False"], ans: 1, exp: "@AfterEach runs after each test, not before." },
  { w: 8, q: "Consider the following code. What will be the results of the above two assertions after the two test methods are run?", opts: ["Pass, Pass","Pass, Fail","Fail, Pass","Fail, Fail"], ans: 2, exp: "assertSame checks reference identity while assertEquals uses equals(). The first fails and the second passes." },

  { w: 8, q: "Which test-generalization step uses AssumeTrue or AssumeFalse?", opts: ["Parameterize","Generalize test oracle","Add assumptions","Cross test generalize"], ans: 2, exp: "Unit tests demonstrate correct usage with concrete inputs and expected outputs — they are executable documentation." },
  { w: 8, q: "True or False: Unit tests act as documentation for how a class should be used.", opts: ["True","False"], ans: 0, exp: "Experience: just high coverage OR many assertions alone is insufficient — both together are required for quality." },
  { w: 8, q: "The quality of a unit test suite depends on both coverage and assertions because:", opts: ["High coverage with no assertions proves the code runs but checks nothing","High assertions with low coverage checks a few things exhaustively but misses most code","Both together ensure code runs AND behaves correctly","All of the above"], ans: 3, exp: "@BeforeAll (and @AfterAll) must be static because they run before any test instance is created." },
  { w: 8, q: "@BeforeAll in JUnit 5 must be:", opts: ["Instance method","Static method","Private method","Abstract method"], ans: 1, exp: "assertThrows(Type.class, executable) returns the exception — you can then assert on exception.getMessage() etc." },

  { w: 8, q: "In @CsvSource, the value \\\"'baz, qux', 3\\\" uses single quotes to:", opts: ["Indicate a char type","Wrap a string value that contains a comma","Mark it as nullable","Denote an enum constant"], ans: 1, exp: "@MethodSource requires a static factory method (in the same class or an external class with fully qualified name)." },

  { w: 8, q: "Test generalization Step 4 (Cross-test generalize) transforms:", opts: ["Constants into parameters","Multiple similar parameterized tests into one more general test","Test oracles into assumptions","Individual tests into a test suite"], ans: 1, exp: "Yes — @AfterEach can assert invariants or postconditions that must hold after every test method completes." },
  { w: 8, q: "True or False: @AfterEach can be used to verify postconditions that should hold after every test.", opts: ["True","False"], ans: 0, exp: "JUnit 5 implicit conversion: 'true'→boolean, '1'→int, 'SECONDS'→TimeUnit, '/path'→File, etc." },
  { w: 8, q: "Implicit string conversion in @ValueSource allows:", opts: ["Passing null directly","JUnit to automatically convert a String to int, boolean, Enum, File, etc.","Converting objects to JSON","Only converting to primitives"], ans: 1, exp: "ArgumentsAccessor gives you arguments.getString(0), arguments.get(2, Gender.class), etc. for multi-column CSV." },
  { w: 8, q: "ArgumentsAccessor is used in parameterized tests to:", opts: ["Validate argument types at compile time","Access multiple CSV columns by index and convert to typed values","Generate random test inputs","Replace @MethodSource"], ans: 1, exp: "If the condition is false, the executable is skipped — but the test CONTINUES (unlike assumeTrue which aborts)." },

  { w: 8, q: "True or False: Two conventional tests CT1 (push elem=1) and CT2 (push elem=30) are redundant with respect to each other after test generalization.", opts: ["True","False"], ans: 0, exp: "In TDD, tests are written before implementation." },
  { w: 8, q: "What is test-driven development (TDD)?", opts: ["Software testers perform the development", "The code is implemented first and then tests are written", "The tests are written before the implementation", "Write code without unit tests"], ans: 2, exp: "assertNotNull(object) verifies the reference is not null." },
  { w: 8, q: "Which of the following assert functions checks that an object isn't null?", opts: ["void assert(Object object, boolean toCheckAsNull)", "void assertCheck(Object object, boolean toCheckAsNull)", "void assertNotNull(Object object)", "void assertChecks(Object object, boolean toCheckAsNull)"], ans: 2, exp: "All listed choices are recognized purposes/benefits of JUnit tests." },
  { w: 8, q: "Which of the following is the purpose of JUnit Test?", opts: ["To check whether the behaviors of the previous versions are preserved during software evolution", "To provide a short feedback loop, because unit tests excise small portions of the code, one at the time", "To provide clear and useful documentation that enables developers or other users of the system to better understand its behavior and how it operates in different scenarios.", "All"], ans: 3, exp: "Readable tests describe intent and avoid duplication." },
  { w: 8, q: "How do you ensure that a test is readable?", opts: ["A. Describing the intentions of the unit test", "B. Delete duplicated or redundant tests", "C. Neither A nor B", "D. Both A and B"], ans: 3, exp: "Quality depends on both coverage and reflection of expected behavior." },
  { w: 8, q: "How can we determine the quality of the unit tests?", opts: ["A. Code coverage: all parts of the program under test are exercised by the unit tests", "B. Reflect the expected behaviors of the code", "C. Neither A nor B", "D. Both A and B"], ans: 3, exp: "Assertion, assumption, and annotation are all JUnit features." },

  {w:14, q: "Which maintenance type prevents future faults proactively (e.g., via refactoring)?", opts: ["Corrective", "Preventive", "Adaptive", "Perfective"], ans:1, exp: "Preventive maintenance is proactive — refactoring, documentation improvement before faults occur."},

  {w:14, q: "Extract Method Step 4: if a local variable is modified in the extracted code:", opts: ["Always return it", "If one variable — return it; if more than one — cannot extract as-is", "Use a global variable", "Make it a class field"], ans:1, exp: "One modified local → return it as result. Multiple modified locals → cannot cleanly extract."},
  {w:14, q: "Feature Envy code smell means:", opts:['A method has too many parameters','A method uses another class\'s data and methods more than its own','A class has no methods','A method calls itself recursively'], ans:1, exp: "Feature Envy: the method \"wishes\" it were in the class it keeps accessing."},
  {w:14, q: "A Large Class code smell is indicated by more than ___ methods or ___ instance variables.", opts: ["10 methods or 3 variables", "24 methods or 6 variables", "50 methods or 10 variables", "15 methods or 5 variables"], ans:1, exp: "Large Class: >24 methods OR >6 instance variables — time to Extract Class or Extract Subclass."},
  {w:14, q: "Message Chain a.getB().getC().getD() is bad because:", opts: ["It is slower", "The client is tightly coupled to the full navigation structure", "It uses too much memory", "It is not object-oriented"], ans:1, exp: "If any intermediate class changes, all Message Chain clients must change too."},

  {w:14, q:"Which of the following code smells occurs when a class has many methods and instance variables (e.g., more than 24 methods or 6 instance variables), making it difficult to understand or maintain?", opts:["Message Chain", "Feature Envy", "Data Class", "Large Class"], ans:3, exp:"A Large Class smell appears when a class grows too big, with too many methods or fields, making it harder to understand and maintain."},

  {w:14, q:"True or False:\nA Message Chain code smell is bad because it makes the client code independent of the internal structure of the navigation between objects.", opts:["True", "False"], ans:1, exp:"False. Message Chain is bad because it exposes internal navigation structure and tightly couples client code to that chain."},

  {w:14, q:"Which of the following is NOT a metric for measuring the size of code?", opts:["Number of lines", "Number of methods", "Number of classes", "Cyclomatic complexity"], ans:3, exp:"Cyclomatic complexity measures control-flow complexity, not code size."},
  {w:14, q:"Is the following statement True or False?\nA method with a cyclomatic complexity greater than 10 is considered hard to test and fault prone.", opts:["True", "False"], ans:0, exp:"True. Higher cyclomatic complexity generally means more paths to test and greater fault risk."},

  {w:14, q:"Which of the following Object Oriented (OO) metrics is used to measure the sum of complexities of the methods in a class?", opts:["Depth of Inheritance Tree (DIT)", "Weighted Methods Per Class (WMC)", "Coupling between Object Classes (CBO)", "Number of Children (NOC)"], ans:1, exp:"WMC measures the combined complexity of methods in a class."},
  {w:14, q:"Is the following statement True or False?\nHigher Coupling between Object Classes (CBO) makes the class easier to test and more reusable.", opts:["True", "False"], ans:1, exp:"False. Higher coupling usually makes code harder to test, harder to reuse, and more fragile."},
  {w:14, q:"Which of the following statements is True about Depth of Inheritance Tree (DIT)?", opts:["A higher DIT value indicates more methods are inherited, making class behavior easier to predict.", "A higher DIT value means the class reuses more methods but is harder to predict and more complex.", "DIT only considers single inheritance and ignores multiple inheritance.", "DIT is unrelated to the complexity of a class."], ans:1, exp:"Higher DIT can increase reuse through inheritance, but it also tends to make behavior harder to understand and predict."},
  {w:14, q:"Which of the following best describes refactoring?", opts:["Changing the external behavior of a program to add new features.", "Changing the internal structure of a program without changing its external behavior.", "Changing the program to optimize performance but altering its functionality.", "Debugging and fixing errors in the code."], ans:1, exp:"Refactoring improves internal structure while preserving externally visible behavior."},
  {w:14, q:"Is the following statement True or False?\nRefactoring should always be done after changing the behavior of a program.", opts:["True", "False"], ans:1, exp:"False. Refactoring itself should not change behavior; it can be done before or after functional changes, but its defining property is behavior preservation."},
  {w:14, q:"Which of the following is NOT a benefit of Extract Method refactoring?", opts:["Increases code reusability", "Increases code readability", "Decreases the number of methods in a class", "Makes the purpose of the code more understandable"], ans:2, exp:"Extract Method usually creates an additional method, so it does not decrease the number of methods in a class."},
  {w:14, q:"Which of the following is the first step when performing Introduce Parameter Object refactoring?", opts:["Add a new parameter whose type is the new class", "Make a new class for the group of parameters", "Incrementally remove each original parameter", "Replace method calls with inlined code"], ans:1, exp:"You first create a class that groups the related parameters together."},

  {w:14, q:"Which of the following is NOT a benefit of using Introduce Parameter Object?", opts:["Reduces the number of parameters in method calls", "Makes the code more difficult to understand", "Increases code readability and maintainability", "Groups related parameters together into a single object"], ans:1, exp:"Introduce Parameter Object is meant to simplify calls and group related data, not make the code harder to understand."},
  {w:14, q:"Which of the following best describes a code smell?", opts:["A clear sign that the code's design is starting to decay", "A syntax error that prevents code from compiling", "An optimized piece of code that improves performance", "A security vulnerability in the code"], ans:0, exp:"A code smell is a surface indication that the design may be deteriorating and could benefit from refactoring."},

  {w:14, q:"Is the following statement True or False?\nA Long Method code smell is problematic because it can be difficult to understand and maintain due to its complexity.", opts:["True", "False"], ans:0, exp:"True. Long methods often become hard to read, reason about, test, and maintain."},

  { w: 14, q: "[14.1] Which type of maintenance adapts software to a changed environment?", opts: ["Corrective", "Preventive", "Adaptive", "Perfective"], ans: 2, exp: "Adaptive maintenance responds to new OS, regulations, or platform changes." },
  { w: 14, q: "[14.1] True or False: Preventive maintenance is typically requested by the customer.", opts: ["True", "False"], ans: 1, exp: "Preventive is an internal quality initiative — customers don\\'t usually ask for it." },

  { w: 14, q: "[14.1] Which maintenance type is NOT visible to the customer?", opts: ["Corrective", "Preventive", "Adaptive", "Perfective"], ans: 1, exp: "Preventive (e.g., refactoring) does not change external behaviour so users see no difference." },
  { w: 14, q: "[14.2] LOC is a valid metric when:", opts: ["Same language, standard formatting, reviewed code", "Any mix of languages is fine", "Blank lines and comments are always excluded", "Longer is always better"], ans: 0, exp: "LOC comparisons only make sense within the same language and formatting standard." },
  { w: 14, q: "[14.2] processInterest() has one for-loop and one if-statement. What is its cyclomatic complexity?", opts: ["1", "2", "3", "4"], ans: 2, exp: "2 decision points (for + if) + 1 = 3." },

  { w: 14, q: "[14.2] Which formula gives cyclomatic complexity for a method with multiple exit points?", opts: ["#decisionPoints + 1", "#edges − #nodes + 2", "#nodes − #edges + 2", "#decisionPoints − 1"], ans: 1, exp: "With multiple exits use #edges − #nodes + 2 (draw the control flow graph)." },
  { w: 14, q: "[14.2] The expression if (x > 0 && y > 0) counts as how many decision points?", opts: ["1", "2", "3", "4"], ans: 1, exp: "Each sub-condition in a compound boolean is one decision point at the machine level." },
  { w: 14, q: "[14.3] WMC stands for:", opts: ["Weighted Methods Per Class", "Width of Method Calls", "Weighted Module Complexity", "Width Metrics Count"], ans: 0, exp: "WMC = Weighted Methods Per Class — sum of method complexities." },
  { w: 14, q: "[14.3] A class with a large DIT (Depth of Inheritance Tree):", opts: ["Is easier to predict its behavior", "Reuses more methods but is harder to predict", "Has no children", "Has lower coupling"], ans: 1, exp: "Deeper classes inherit more but behavior is harder to predict." },
  { w: 14, q: "[14.3] Which metric measures coupling between classes?", opts: ["WMC", "DIT", "NOC", "CBO"], ans: 3, exp: "CBO = Coupling Between Object Classes — the number of other classes this class calls methods on." },
  { w: 14, q: "[14.3] RFC for a class is defined as:", opts: ["Number of methods in the class only", "Number of methods called by the class only", "Union of methods in the class and methods called by the class", "Number of instance variables"], ans: 2, exp: "RFC = |methods in class ∪ methods called by class|." },

  { w: 14, q: "[14.4] Refactoring changes the ___ without changing the ___.", opts: ["External behavior; internal structure", "Internal structure; external behavior", "Requirements; design", "Design; requirements"], ans: 1, exp: "Refactoring restructures code without altering observable behavior." },
  { w: 14, q: "[14.4] Which is NOT an example of a named refactoring?", opts: ["Extract Method", "Inline Method", "Add Feature", "Rename"], ans: 2, exp: "Add Feature\" adds new behavior — that is not refactoring by definition." },

  { w: 14, q: "[14.4] True or False: You should always refactor and add features at the same time for efficiency.", opts: ["True", "False"], ans: 1, exp: "Change DESIGN XOR FUNCTIONALITY — never mix refactoring with behaviour changes." },

  { w: 14, q: "[14.7] customer.getAddress().getState().getCode() is an example of:", opts: ["Feature Envy", "Message Chain", "Data Class", "Long Method"], ans: 1, exp: "Message Chain — client is coupled to the navigation structure." },

  { w: 14, q: "[Summary] Method with 3 if-statements and 1 while-loop and one exit — cyclomatic complexity?", opts: ["4", "5", "6", "3"], ans: 1, exp: "3 ifs + 1 while = 4 decision points + 1 = 5." },
